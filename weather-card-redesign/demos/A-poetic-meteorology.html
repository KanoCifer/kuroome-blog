<!doctype html>
<html lang="zh-CN" data-color-scheme="sky-blue">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A · 气象诗集 · Weather Card Redesign</title>

    <!-- Tailwind v3 via Play CDN (最简单:无需 build step) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

    <!-- 字体走系统栈,避免引入新字体 -->
    <style>
      :root {
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* ============================================================
       * Sky-blue 浅色主题 (项目默认,light)
       * 抄自 frontend/src/assets/themes/sky-blue.css 的 :root 段
       * ============================================================ */
      :root,
      [data-color-scheme="sky-blue"] {
        --ink: oklch(0.13 0.028 261.692);
        --paper: oklch(0.97 0.013 260);
        --warm-gray: oklch(0.95 0.018 260);
        --muted-text: oklch(0.551 0.027 264.364);
        --accent-amber: oklch(0.769 0.188 70.08);
        --accent-sage: oklch(0.627 0.194 149.214);
        --accent-slate: oklch(0.707 0.022 261.325);
        --accent-rose: oklch(0.577 0.245 27.325);
        --workspace-accent: oklch(0.63 0.27 254);
        --workspace-accent-contrast: oklch(0.97 0.013 260);
        --card-bg: oklch(0.99 0.006 260);
        --border-line: oklch(0.92 0.012 260);

        /* shadcn-style semantic token bridge */
        --background: var(--paper);
        --foreground: var(--ink);
        --card: var(--card-bg);
        --card-foreground: var(--ink);
        --primary: var(--workspace-accent);
        --primary-foreground: var(--workspace-accent-contrast);
        --muted: var(--warm-gray);
        --muted-foreground: var(--muted-text);
        --warning: var(--accent-amber);
        --success: var(--accent-sage);
        --destructive: var(--accent-rose);
        --border: var(--border-line);
        --input: var(--border-line);
      }

      /* ============================================================
       * Sky-blue 暗色 (.dark 在浅色 scheme 下)
       * 抄自 sky-blue.css 的 [data-color-scheme='sky-blue'].dark 段
       * ============================================================ */
      [data-color-scheme="sky-blue"].dark {
        --ink: oklch(0.96 0.012 261);
        --paper: oklch(0.16 0.028 262);
        --warm-gray: oklch(0.34 0.03 257);
        --muted-text: oklch(0.78 0.022 261);
        --accent-amber: oklch(0.78 0.16 70);
        --workspace-accent: oklch(0.7 0.16 258);
        --workspace-accent-contrast: oklch(0.16 0.028 262);
        --card-bg: oklch(0.22 0.034 264);
        --border-line: oklch(0.32 0.03 264);
      }

      /* ============================================================
       * Midnight 主题 (浅色)
       * ============================================================ */
      [data-color-scheme="midnight"] {
        --ink: oklch(0.2 0.05 280);
        --paper: oklch(0.97 0.012 280);
        --warm-gray: oklch(0.95 0.02 280);
        --muted-text: oklch(0.55 0.03 280);
        --accent-amber: oklch(0.75 0.15 80);
        --accent-sage: oklch(0.65 0.1 160);
        --accent-rose: oklch(0.6 0.18 20);
        --workspace-accent: oklch(0.55 0.22 268);
        --workspace-accent-contrast: oklch(0.98 0.01 280);
        --card-bg: oklch(0.99 0.005 280);
        --border-line: oklch(0.92 0.012 280);
      }

      /* ============================================================
       * Midnight 主题 (.dark 暗色) —— 项目主推深色变体
       * 抄自 midnight.css 的 [data-color-scheme='midnight'].dark 段
       * ============================================================ */
      [data-color-scheme="midnight"].dark {
        --ink: oklch(0.96 0.012 280);
        --paper: oklch(0.12 0.03 280);
        --warm-gray: oklch(0.32 0.04 280);
        --muted-text: oklch(0.78 0.04 280);
        --accent-amber: oklch(0.8 0.14 80);
        --accent-sage: oklch(0.72 0.12 160);
        --accent-rose: oklch(0.78 0.16 20);
        --workspace-accent: oklch(0.7 0.2 268);
        --workspace-accent-contrast: oklch(0.12 0.03 280);
        --card-bg: oklch(0.21 0.04 280);
        --border-line: oklch(0.32 0.04 280);
      }

      /* ============================================================
       * 把 shadcn semantic token 映射到 Tailwind utility class
       * Tailwind v3 浏览器版支持 arbitrary value: bg-[var(--card)]
       * 但为了一致性,这里走 @layer utilities 把 class 名稳定下来
       * ============================================================ */
      @layer utilities {
        .bg-background { background-color: var(--background); }
        .text-foreground { color: var(--foreground); }
        .bg-card { background-color: var(--card); }
        .text-card-foreground { color: var(--card-foreground); }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
        .text-primary-foreground { color: var(--primary-foreground); }
        .bg-muted { background-color: var(--muted); }
        .text-muted-foreground { color: var(--muted-foreground); }
        .text-warning { color: var(--warning); }
        .text-success { color: var(--success); }
        .text-destructive { color: var(--destructive); }
        .border-border { border-color: var(--border); }
        .border-input { border-color: var(--input); }
        .ring-ring { --tw-ring-color: var(--ring); }
      }

      /* 隐藏滚动条但允许滚动 (echarts tooltip 等可能溢出) */
      body { overflow-x: hidden; }
    </style>

    <script>
      // Theme detection: ?theme=dark 走暗色,否则走 sky-blue 浅色 (项目默认)
      (function () {
        const params = new URLSearchParams(location.search);
        const theme = params.get("theme");
        if (theme === "dark") {
          document.documentElement.setAttribute("data-color-scheme", "midnight");
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.setAttribute("data-color-scheme", "sky-blue");
          // sky-blue 浅色 = light,不需要 .dark
        }
      })();
    </script>

        font-style: italic;

        letter-spacing: -0.04em;

        font-variant-numeric: tabular-nums;

      .display-serif {

          ui-serif, Georgia, Cambria, "Times New Roman", "Songti SC", serif;
      }
    </style>
  </head>

    <!-- ============================================================
         ECharts: 24h 数据
         ============================================================ -->
    <script>
      (function () {
        // x 轴: 14:00 → 次日 13:00 (24 个点)
        const xData = [
          "14:00", "15:00", "16:00", "17:00", "18:00", "19:00",
          "20:00", "21:00", "22:00", "23:00", "00:00", "01:00",
          "02:00", "03:00", "04:00", "05:00", "06:00", "07:00",
          "08:00", "09:00", "10:00", "11:00", "12:00", "13:00",
        ];

        // 降水 (mm): 18:00 / 21:00 / 02:00 / 09:00 有几根小柱
        const rainData = [
          0, 0, 0, 0, 4.2, 1.0,
          0, 3.5, 1.8, 0, 0, 0,
          2.5, 0, 0, 0, 0, 0,
          0, 4.8, 0, 0, 0, 0,
        ];

        // 温度 (°C): 22 升到 28 高峰 (17:00), 夜里回落到 24 最低 (04:00), 早上回升到 26
        const tempData = [
          22, 24, 26, 28, 27, 25,
          24, 24, 25, 26, 25, 24,
          24, 24, 24, 25, 25, 26,
          26, 26, 26, 26, 26, 26,
        ];

        // 雨峰时段 (markArea 背景条) —— 用 numeric xAxis 索引定位到具体那一栏
        const rainAreaIndices = [4, 7, 12, 19]; // 18:00 / 21:00 / 02:00 / 09:00

        // 找温度最大/最小索引 (用于极值标注)
        const maxIdx = tempData.indexOf(Math.max(...tempData));
        const minIdx = tempData.indexOf(Math.min(...tempData));

        // 读 CSS 变量给 echarts 上色 (跨主题都成立)
        function cssVar(name) {
          return getComputedStyle(document.documentElement)
            .getPropertyValue(name)
            .trim();
        }

        const isDark = document.documentElement.classList.contains("dark");

        const colorInk = cssVar("--ink") || "#0f172a";
        const colorMuted = cssVar("--muted-text") || "#64748b";
        const colorBorder = cssVar("--border-line") || "rgba(0,0,0,0.1)";
        const colorPrimary = cssVar("--primary") || "#4f7df9";
        const colorWarning = cssVar("--warning") || "#f59e0b";
        const colorCard = cssVar("--card-bg") || "#ffffff";

        const chart = echarts.init(document.getElementById("hourly-chart"), null, {
          renderer: "canvas",
        });

        // 雨峰时段背景:用单独的隐形 bar 系列,barWidth='100%' 占满单格
        // 这样不会受到 markArea 在 category 轴上的奇怪解释影响
        const rainBgData = xData.map((_, idx) =>
          rainAreaIndices.includes(idx) ? 8 : 0,
        );

        // markPoint: 温度最大 + 最小 + serif 极小数字注释
        // 最小点 (idx 0) 紧贴左轴, 标签会撞上 y 轴; 因此把 min 标签放在"上"位
        const markPointData = [
          {
            name: "最高",
            coord: [xData[maxIdx], tempData[maxIdx]],
            value: tempData[maxIdx] + "°",
            itemStyle: { color: colorWarning },
            label: {
              show: true,
              position: "top",
              formatter: "{c}",
              color: colorWarning,
              fontSize: 11,
              fontStyle: "italic",
              fontFamily: 'ui-serif, Georgia, "Songti SC", serif',
              distance: 6,
            },
          },
          {
            name: "最低",
            coord: [xData[minIdx], tempData[minIdx]],
            value: tempData[minIdx] + "°",
            itemStyle: { color: colorPrimary },
            label: {
              show: true,
              position: "right",
              formatter: "{c}",
              color: colorPrimary,
              fontSize: 11,
              fontStyle: "italic",
              fontFamily: 'ui-serif, Georgia, "Songti SC", serif',
              distance: 6,
            },
          },
        ];

        const option = {
          backgroundColor: "transparent",
          animation: false,
          textStyle: {
            color: colorInk,
            fontFamily:
              'ui-sans-serif, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif',
          },
          tooltip: {
            trigger: "axis",
            backgroundColor: colorCard,
            borderColor: colorBorder,
            borderWidth: 1,
            borderRadius: 10,
            padding: [10, 14],
            textStyle: { color: colorInk, fontSize: 12 },
            axisPointer: {
              type: "line",
              lineStyle: { color: colorBorder, type: "dashed", width: 1 },
            },
            formatter: (params) => {
              const time = params[0]?.axisValue || "";
              const lines = params
                .map((it) => {
                  const unit = it.seriesName.includes("温度") ? "°C" : "mm";
                  return `<div style="display:flex;align-items:center;gap:8px;margin-top:2px;">
                    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${it.color};"></span>
                    <span style="color:${colorMuted};font-size:11px;">${it.seriesName}</span>
                    <span style="font-weight:600;margin-left:auto;font-variant-numeric:tabular-nums;">${it.data}${unit}</span>
                  </div>`;
                })
                .join("");
              return `<div style="font-weight:600;font-size:11px;color:${colorMuted};margin-bottom:4px;letter-spacing:0.05em;">${time}</div>${lines}`;
            },
          },
          grid: { left: 8, right: 8, top: 28, bottom: 8, containLabel: true },
          xAxis: {
            type: "category",
            boundaryGap: true,
            data: xData,
            axisLine: {
              show: true,
              lineStyle: { color: colorBorder, width: 1, type: "dashed" },
            },
            axisTick: { show: false },
            axisLabel: {
              color: colorMuted,
              fontSize: 10,
              interval: 3,
            },
            splitLine: { show: false },
          },
          yAxis: [
            {
              type: "value",
              position: "left",
              min: 0,
              max: 6,
              axisLine: { show: false },
              axisTick: { show: false },
              splitLine: { show: false },
              axisLabel: {
                color: colorMuted,
                fontSize: 10,
                formatter: (v) => `${v}mm`,
              },
            },
            {
              type: "value",
              position: "right",
              min: 18,
              max: 32,
              axisLine: { show: false },
              axisTick: { show: false },
              splitLine: { show: false },
              axisLabel: {
                color: colorWarning,
                fontSize: 10,
                formatter: (v) => `${v}°`,
              },
            },
          ],
          series: [
            {
              // 隐形背景条:雨峰时段用极浅 primary 铺满单格,作为"预计降水"标记
              name: "_rain_bg",
              type: "bar",
              data: rainBgData,
              yAxisIndex: 0,
              barWidth: 22,
              barGap: "-100%",
              itemStyle: {
                color: colorPrimary,
                opacity: 0.18,
                borderRadius: [4, 4, 0, 0],
              },
              silent: true,
              tooltip: { show: false },
              emphasis: { disabled: true },
            },
            {
              name: "降水量",
              type: "bar",
              data: rainData,
              yAxisIndex: 0,
              barWidth: 10,
              itemStyle: {
                color: colorPrimary,
                opacity: 0.85,
                borderRadius: [2, 2, 0, 0],
              },
              emphasis: { disabled: true },
              z: 2,
            },
            {
              name: "温度",
              type: "line",
              data: tempData,
              yAxisIndex: 1,
              lineStyle: { width: 2, color: colorWarning },
              symbol: "circle",
              symbolSize: 5,
              showSymbol: true,
              itemStyle: {
                color: colorWarning,
                borderWidth: 2,
                borderColor: colorCard,
              },
              smooth: 0.3,
              emphasis: { focus: "self" },
              markPoint: {
                symbol: "circle",
                symbolSize: 6,
                data: markPointData,
                label: { distance: 8 },
              },
              z: 3,
            },
          ],
        };

        chart.setOption(option);

        // 主题切换 (按 hash 第二次进入也能切)
        window.addEventListener("resize", () => chart.resize());
      })();
    </script>
  </body>
</html>
