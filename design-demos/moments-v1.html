<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>碎碎念 / Moments · 设计演示 · v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <script
    src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    crossorigin="anonymous"
  ></script>
  <style>
    :root {
      --paper: oklch(0.97 0.013 50);
      --paper-2: oklch(0.95 0.018 50);
      --ink: #1a1613;
      --ink-2: #5b554a;
      --ink-3: #9a918a;
      --hairline: rgba(26, 22, 19, 0.12);
      --warm-gray: oklch(0.95 0.018 50);
      --accent-amber: #c8713a;
      --workspace-accent: #8a653f;
      --workspace-accent-soft: #f2e7db;
      --card-bg: oklch(0.99 0.008 50);
      --muted-text: #9a918a;
      --radius: 0.625rem;
      --font-disp: 'Newsreader', 'Noto Serif SC', 'Songti SC', serif;
      --font-body: 'Noto Serif SC', 'Newsreader', serif;
      --font-sans: 'Noto Sans SC', -apple-system, 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #d8cfbf; font-family: var(--font-body); color: var(--ink); }
    body { padding: 24px 24px 80px; min-height: 100vh; }
    .page-header { max-width: 1280px; margin: 0 auto 24px; }
    .page-header h1 { font-family: var(--font-disp); font-size: 28px; font-weight: 500; font-style: italic; margin: 0; letter-spacing: -0.01em; }
    .page-header .pill { display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 10px; border: 1px solid var(--ink); color: var(--ink); margin-left: 12px; vertical-align: middle; }
    .page-header .lede { font-size: 13px; color: var(--ink-2); max-width: 820px; line-height: 1.6; margin: 8px 0 0; }
    .canvas-row { display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr); gap: 24px; max-width: 1280px; margin: 0 auto 32px; }
    .panel-meta { display: flex; align-items: baseline; gap: 10px; margin: 0 0 12px; padding-left: 8px; }
    .panel-meta .label { font-family: var(--font-disp); font-style: italic; font-size: 15px; color: var(--ink); }
    .panel-meta .sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
    .panel-meta .rule { flex: 1; height: 1px; background: var(--hairline); margin-left: 8px; }
    .browser-frame { background: var(--paper); border: 1px solid rgba(26,22,19,0.2); box-shadow: 0 18px 50px rgba(26,22,19,0.18), 0 0 0 1.5px rgba(26,22,19,0.08); border-radius: 8px; overflow: hidden; }
    .browser-chrome { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #2a221b; }
    .browser-chrome .dot { width: 11px; height: 11px; border-radius: 50%; }
    .browser-chrome .dot.r { background: #ff5f57; }
    .browser-chrome .dot.y { background: #febc2e; }
    .browser-chrome .dot.g { background: #28c840; }
    .browser-chrome .url { flex: 1; font-family: var(--font-mono); font-size: 11px; color: #b0a89e; background: #14100d; padding: 4px 10px; border-radius: 4px; }
    .browser-body { background: var(--paper); }
    .vertical-kan { writing-mode: vertical-rl; text-orientation: mixed; max-height: 460px; overflow-y: auto; padding: 8px 16px; }
    .vertical-kan p { margin: 0 0 1.2em; line-height: 2.1; font-size: 16px; }
    .vertical-kan::-webkit-scrollbar { width: 4px; }
    .vertical-kan::-webkit-scrollbar-thumb { background: var(--hairline); }
    .annotation { position: absolute; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-amber); background: var(--paper-2); padding: 2px 6px; border: 1px solid var(--accent-amber); border-radius: 2px; pointer-events: none; white-space: nowrap; }
    .legend { background: var(--paper); border: 1px solid var(--hairline); padding: 16px 20px; margin: 32px auto 0; font-size: 12px; line-height: 1.8; color: var(--ink-2); max-width: 1280px; font-family: var(--font-body); }
    .legend strong { color: var(--ink); font-weight: 600; }
    .legend code { font-family: var(--font-mono); font-size: 11px; background: var(--warm-gray); padding: 1px 5px; border-radius: 2px; }
    .footer-rule { max-width: 1280px; margin: 40px auto 0; padding-top: 16px; border-top: 1px solid var(--hairline); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-3); display: flex; justify-content: space-between; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useMemo } = React;

    const T = {
      paper: 'oklch(0.97 0.013 50)',
      paper2: 'oklch(0.95 0.018 50)',
      card: 'oklch(0.99 0.008 50)',
      ink: '#1a1613',
      ink2: '#5b554a',
      ink3: '#9a918a',
      hairline: 'rgba(26, 22, 19, 0.12)',
      warmGray: 'oklch(0.95 0.018 50)',
      amber: '#c8713a',
      accent: '#8a653f',
      soft: '#f2e7db',
    };
    const fD = "'Newsreader','Noto Serif SC','Songti SC',serif";
    const fB = "'Noto Serif SC','Newsreader',serif";
    const fS = "'Noto Sans SC',-apple-system,sans-serif";
    const fM = "'JetBrains Mono','SF Mono',monospace";

    const MOMENTS = [
      {
        id: 'm-001',
        volume: '卷三',
        mood: '🌿',
        time: '2026-06-17 18:24',
        content: '今天在湖边坐了一整个下午，没钓鱼，没读书，也没看手机。风把一本《万物静默如谜》的封面掀起来又放下，反复三次。我想，所谓「在出钓与阅读之间，留一片安静」，大概就是这个意思吧。',
        tags: ['日常', '钓鱼', '随笔'],
        isPinned: true,
      },
      {
        id: 'm-002',
        volume: '卷二',
        mood: '☕',
        time: '2026-06-15 09:08',
        content: '早晨煮了一壶挂耳。书桌台灯下那杯咖啡的影子拉得很长，落在刚翻到一半的《追忆似水年华》上，普鲁斯特大概会同意我先喝完再读。',
        tags: ['日常', '阅读'],
        isPinned: false,
      },
      {
        id: 'm-003',
        volume: '卷一',
        mood: null,
        time: '2026-06-12 22:47',
        content: '读完北岛《时间的玫瑰》最后一首，关灯。窗外的城市把天空染成铁锈色。如果诗可以是一座城市的墓志铭，那这座城市一定死于自己。',
        tags: ['书摘', '诗'],
        isPinned: false,
      },
      {
        id: 'm-004',
        volume: '卷四',
        mood: '🌧',
        time: '2026-06-10 16:30',
        content: '广州入梅了。书房的木地板有一小块被花盆洇湿，形状像北海道。',
        tags: ['天气', '日常'],
        isPinned: false,
      },
    ];

    function PinSvg() {
      return (
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
          <path strokeLinecap="round" strokeLinejoin="round" d="M12 2.25l2.6 4.95 5.4.6-4.05 3.7 1.1 5.45L12 14.1l-5.05 2.85 1.1-5.45-4.05-3.7 5.4-.6L12 2.25z" />
        </svg>
      );
    }

    function MomentCard({ m }) {
      const firstChar = m.content.charAt(0);
      const rest = m.content.slice(1);
      return (
        <article style={{
          position: 'relative',
          background: m.isPinned ? '#f4e7d0' : T.card,
          border: m.isPinned ? '1px solid rgba(200,113,58,0.4)' : '1px solid var(--hairline)',
          borderRadius: 'calc(var(--radius) + 4px)',
          padding: '20px 22px 20px 26px',
          boxShadow: '0 1px 0 rgba(26,22,19,0.03), 0 1px 3px rgba(26,22,19,0.04)',
          cursor: 'pointer',
        }}>
          <div style={{
            position: 'absolute', top: 12, bottom: 12, left: 10,
            borderLeft: m.isPinned ? '1.5px dashed rgba(200,113,58,0.55)' : '1.5px dashed var(--hairline)',
          }} />

          {m.isPinned && (
            <div style={{
              position: 'absolute', top: -10, left: 22,
              display: 'inline-flex', alignItems: 'center', gap: 4,
              padding: '3px 8px', background: 'rgba(200,113,58,0.15)',
              border: '1px solid rgba(200,113,58,0.4)',
              borderRadius: 999, fontSize: 10, color: T.amber,
              fontFamily: fM, fontWeight: 600, letterSpacing: '0.12em',
            }}>
              <PinSvg /> PINNED
            </div>
          )}

          <div style={{
            display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 10,
            fontSize: 11, color: T.ink2, fontFamily: fS, letterSpacing: '0.04em',
            paddingLeft: 4,
          }}>
            <span style={{ fontFamily: fD, fontStyle: 'italic', color: T.ink2, fontSize: 13 }}>{m.volume}</span>
            <span style={{ color: T.ink3 }}>·</span>
            {m.mood && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><span style={{ fontSize: 14 }}>{m.mood}</span></span>}
            {m.mood && <span style={{ color: T.ink3 }}>·</span>}
            <span style={{ fontFamily: fM, fontSize: 10, color: T.ink3, letterSpacing: '0.05em' }}>{m.time}</span>
          </div>

          <p style={{
            margin: '12px 0 0', paddingLeft: 4,
            fontFamily: fB, fontSize: 15, lineHeight: 1.85, color: T.ink,
            letterSpacing: '0.01em',
          }}>
            <span style={{
              fontFamily: fD, fontSize: '2.6em', float: 'left',
              lineHeight: 0.9, margin: '0.06em 0.10em -0.06em 0',
              fontWeight: 600, color: T.accent,
            }}>{firstChar}</span>
            {rest}
          </p>

          {m.tags.length > 0 && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 14, paddingLeft: 4 }}>
              {m.tags.map(t => (
                <span key={t} style={{
                  fontSize: 11, fontFamily: fB, color: T.ink2,
                  background: T.soft, padding: '2px 9px', borderRadius: 999,
                  border: '1px solid var(--hairline)',
                }}>#{t}</span>
              ))}
            </div>
          )}
        </article>
      );
    }

    const chipStyle = (active) => ({
      padding: '4px 12px',
      borderRadius: 999,
      fontSize: 12, fontFamily: fB,
      background: active ? T.amber : T.card,
      color: active ? '#fffaf5' : T.ink2,
      border: active ? `1px solid ${T.amber}` : '1px solid var(--hairline)',
      cursor: 'pointer',
      fontWeight: active ? 500 : 400,
    });

    function MomentListView() {
      const [tag, setTag] = useState(null);
      const allTags = useMemo(() => {
        const s = new Set();
        MOMENTS.forEach(m => m.tags.forEach(t => s.add(t)));
        return Array.from(s);
      }, []);
      const filtered = tag ? MOMENTS.filter(m => m.tags.includes(tag)) : MOMENTS;
      return (
        <div style={{ padding: '0 0 32px' }}>
          <div style={{ textAlign: 'center', padding: '52px 24px 32px' }}>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12, color: T.ink3, fontFamily: fM, fontSize: 10, letterSpacing: '0.25em', textTransform: 'uppercase', marginBottom: 18 }}>
              <span style={{ width: 24, height: 1, background: T.ink3 }} />
              kanocifer
              <span style={{ width: 24, height: 1, background: T.ink3 }} />
            </div>
            <h1 style={{
              fontFamily: fD, fontSize: 84, fontWeight: 500, fontStyle: 'italic',
              margin: 0, color: T.ink, letterSpacing: '-0.02em', lineHeight: 0.95,
            }}>碎碎念</h1>
            <div style={{ marginTop: 16, display: 'inline-flex', alignItems: 'center', gap: 8, padding: '5px 14px', background: T.card, border: '1px solid var(--hairline)', borderRadius: 999, fontSize: 11, color: T.ink2 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.amber }} />
              卷 · 2026
            </div>
          </div>

          <div style={{ maxWidth: 640, margin: '0 auto', padding: '0 24px' }}>
            {allTags.length > 0 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 20, alignItems: 'center' }}>
                <span style={{ fontFamily: fM, fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', color: T.ink3, marginRight: 6 }}>filter</span>
                <button onClick={() => setTag(null)} style={chipStyle(tag === null)}>全部</button>
                {allTags.map(t => (
                  <button key={t} onClick={() => setTag(t)} style={chipStyle(tag === t)}>#{t}</button>
                ))}
              </div>
            )}

            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              {filtered.map(m => <MomentCard key={m.id} m={m} />)}
            </div>

            <div style={{ marginTop: 28, display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontFamily: fM, fontSize: 11, color: T.ink3, letterSpacing: '0.08em' }}>
              <span>第 1 / 1 卷</span>
              <span style={{ color: T.ink2 }}>·</span>
              <span>共 4 条</span>
            </div>
          </div>
        </div>
      );
    }

    function MetaRow({ label, value, mono }) {
      return (
        <div style={{ display: 'flex', gap: 12, alignItems: 'baseline', marginBottom: 10, fontSize: 13 }}>
          <span style={{ fontFamily: fM, fontSize: 10, color: T.ink3, letterSpacing: '0.1em', textTransform: 'uppercase', minWidth: 36 }}>{label}</span>
          <span style={{ fontFamily: mono ? fM : fB, color: T.ink, fontSize: mono ? 11 : 13 }}>{value || '—'}</span>
        </div>
      );
    }
    function KbdRow({ key1, desc }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
          <kbd style={{ fontFamily: fM, fontSize: 10, padding: '2px 6px', background: T.warmGray, border: '1px solid var(--hairline)', borderRadius: 3, minWidth: 24, textAlign: 'center' }}>{key1}</kbd>
          <span style={{ fontSize: 12, color: T.ink2 }}>{desc}</span>
        </div>
      );
    }

    function MomentDetailView() {
      const m = MOMENTS[0];
      return (
        <div style={{ padding: '40px 32px 32px' }}>
          <div style={{ textAlign: 'center', marginBottom: 28 }}>
            <div style={{ fontFamily: fM, fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>DETAIL · 详情</div>
            <h2 style={{ fontFamily: fD, fontSize: 40, fontWeight: 500, fontStyle: 'italic', margin: 0, color: T.ink, letterSpacing: '-0.01em' }}>
              {m.volume} · 2026 年 6 月 17 日
            </h2>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) 240px', gap: 40, alignItems: 'start' }}>
            <div style={{
              background: T.card, border: '1px solid var(--hairline)',
              borderRadius: 12, padding: 24, position: 'relative',
              minHeight: 480,
            }}>
              <div style={{ position: 'absolute', top: 16, right: 16, display: 'flex', gap: 6, fontFamily: fM, fontSize: 10, color: T.ink3, letterSpacing: '0.1em' }}>
                <span style={{ padding: '3px 8px', background: T.amber, color: '#fffaf5', borderRadius: 3 }}>竖排</span>
                <span style={{ padding: '3px 8px', border: '1px solid var(--hairline)', borderRadius: 3 }}>横排</span>
              </div>

              <div className="vertical-kan" style={{ fontFamily: fB, color: T.ink, marginTop: 20, marginLeft: 12 }}>
                <p style={{ textIndent: '2em' }}>{m.content}</p>
                <p style={{ color: T.ink2, fontSize: 14, fontStyle: 'italic', fontFamily: fD, textIndent: 0, marginTop: 32 }}>
                  —— 记于 {m.time.replace(/-/g, ' 年 ').replace(' ', ' 月 ').replace(':', ' 时 ')} 分
                </p>
              </div>
            </div>

            <aside style={{ position: 'sticky', top: 24, fontFamily: fS }}>
              <div style={{ background: T.card, border: '1px solid var(--hairline)', borderRadius: 12, padding: 18 }}>
                <div style={{ fontFamily: fM, fontSize: 10, letterSpacing: '0.15em', textTransform: 'uppercase', color: T.ink3, marginBottom: 14 }}>META · 元数据</div>
                <MetaRow label="心情" value={m.mood} mono={false} />
                <MetaRow label="卷序" value={m.volume} mono={true} />
                <MetaRow label="标签" value={m.tags.join(' · ')} mono={false} />
                <MetaRow label="来源" value="湖边 · 阳台" mono={false} />
                <MetaRow label="发布" value={m.time} mono={true} />

                <div style={{ marginTop: 16, paddingTop: 14, borderTop: '1px dashed var(--hairline)', fontSize: 11, color: T.ink2, lineHeight: 1.6 }}>
                  上一条 · 卷二<br />
                  下一条 · 暂无
                </div>
              </div>

              <div style={{ marginTop: 14, background: T.card, border: '1px solid var(--hairline)', borderRadius: 12, padding: 18, fontSize: 12, color: T.ink2, lineHeight: 1.7 }}>
                <div style={{ fontFamily: fM, fontSize: 10, letterSpacing: '0.15em', textTransform: 'uppercase', color: T.ink3, marginBottom: 10 }}>KEYBOARD</div>
                <KbdRow key1="J" desc="下一条" />
                <KbdRow key1="K" desc="上一条" />
                <KbdRow key1="Esc" desc="返回列表" />
              </div>
            </aside>
          </div>
        </div>
      );
    }

    function Field({ label, sub, required, children }) {
      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 6 }}>
            <label style={{ fontFamily: fB, fontSize: 13, color: T.ink, fontWeight: 500 }}>{label}</label>
            {required && <span style={{ color: T.amber, fontSize: 11 }}>*</span>}
            {sub && <span style={{ fontFamily: fS, fontSize: 11, color: T.ink3 }}>{sub}</span>}
          </div>
          {children}
        </div>
      );
    }
    function TagPill({ label }) {
      return (
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 4,
          padding: '2px 8px 2px 10px', background: T.soft, border: '1px solid var(--hairline)',
          borderRadius: 999, fontSize: 12, fontFamily: fB, color: T.ink2,
        }}>
          #{label}
          <span style={{ cursor: 'pointer', color: T.ink3, fontSize: 11 }}>×</span>
        </span>
      );
    }

    function MomentEditorView() {
      return (
        <div style={{ padding: '32px 28px' }}>
          <div style={{ marginBottom: 22 }}>
            <div style={{ fontFamily: fM, fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>EDITOR · 新建</div>
            <h2 style={{ fontFamily: fD, fontSize: 32, fontWeight: 500, fontStyle: 'italic', margin: 0, color: T.ink, letterSpacing: '-0.01em' }}>
              写一句
            </h2>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) 220px', gap: 22 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <Field label="内容" sub="必填 · 1~2000 字 · Markdown" required>
                <div style={{
                  background: T.card, border: '1px solid var(--hairline)', borderRadius: 10,
                  padding: 18, fontFamily: fB, fontSize: 15, lineHeight: 1.85, color: T.ink,
                  minHeight: 220, position: 'relative',
                  backgroundImage: 'repeating-linear-gradient(transparent 0, transparent 30px, rgba(26,22,19,0.05) 30px, rgba(26,22,19,0.05) 31px)',
                  backgroundPosition: '0 12px',
                }}>
                  <span style={{ color: T.ink3 }}>今天在湖边坐了一整个下午，</span>
                  <span style={{ background: 'rgba(200,113,58,0.18)', borderRadius: 2 }}>没钓鱼，没读书，也没看手机</span>
                  <span style={{ color: T.ink3 }}>。风把一本《万物静默如谜》的封面掀起来又放下，</span>
                  <span style={{ borderBottom: `1px solid ${T.amber}` }}>反复三次</span>
                  <span style={{ color: T.ink3 }}>。</span>
                  <span style={{ display: 'inline-block', width: 1, height: 18, background: T.ink, verticalAlign: 'middle', marginLeft: 2, animation: 'blink 1s steps(2) infinite' }} />
                </div>
                <div style={{ marginTop: 6, display: 'flex', justifyContent: 'space-between', fontFamily: fM, fontSize: 10, color: T.ink3, letterSpacing: '0.05em' }}>
                  <span>已保存草稿 · 12 秒前</span>
                  <span>86 / 2000</span>
                </div>
              </Field>

              <Field label="心情" sub="emoji 或一个词">
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {['🌿','☕','🌧','📖','🐟','🌙','☀','🍃','🎣','✏','💭','🪴'].map(e => (
                    <button key={e} style={{
                      width: 32, height: 32, fontSize: 18, background: T.card, border: '1px solid var(--hairline)',
                      borderRadius: 8, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}>{e}</button>
                  ))}
                </div>
              </Field>

              <Field label="标签" sub="回车添加，× 删除 · ≤20">
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, padding: '8px 10px', background: T.card, border: '1px solid var(--hairline)', borderRadius: 8, alignItems: 'center' }}>
                  <TagPill label="日常" />
                  <TagPill label="钓鱼" />
                  <TagPill label="随笔" />
                  <input placeholder="新标签…" style={{ border: 'none', background: 'transparent', outline: 'none', fontSize: 12, fontFamily: fB, color: T.ink, minWidth: 80 }} />
                </div>
              </Field>
            </div>

            <aside style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <Field label="可见性">
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {[['public','公开','任何访客可见'],
                    ['unlisted','不列出','链接可访问，但不在列表'],
                    ['private','不公开','仅自己']].map(([v,l,d],i) => (
                    <label key={v} style={{ display: 'flex', alignItems: 'flex-start', gap: 8, padding: '8px 10px', background: T.card, border: i===0 ? `1px solid ${T.amber}` : '1px solid var(--hairline)', borderRadius: 8, cursor: 'pointer' }}>
                      <input type="radio" name="vis" defaultChecked={i===0} style={{ marginTop: 2 }} />
                      <div>
                        <div style={{ fontFamily: fB, fontSize: 13, color: T.ink, fontWeight: i===0 ? 500 : 400 }}>{l}</div>
                        <div style={{ fontFamily: fS, fontSize: 11, color: T.ink3, marginTop: 1 }}>{d}</div>
                      </div>
                    </label>
                  ))}
                </div>
              </Field>

              <Field label="状态">
                <select style={{ width: '100%', padding: '8px 10px', background: T.card, border: '1px solid var(--hairline)', borderRadius: 8, fontFamily: fB, fontSize: 13, color: T.ink }}>
                  <option>已发布</option>
                  <option>草稿</option>
                  <option>归档</option>
                </select>
              </Field>

              <Field label="选项">
                <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: T.ink, marginBottom: 8 }}>
                  <input type="checkbox" defaultChecked /> 置顶
                </label>
                <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: T.ink }}>
                  <input type="checkbox" defaultChecked /> 允许评论
                </label>
              </Field>

              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 8 }}>
                <button style={{ padding: '10px 14px', background: T.amber, color: '#fffaf5', border: 'none', borderRadius: 8, fontFamily: fB, fontSize: 14, fontWeight: 500, cursor: 'pointer' }}>
                  发布
                </button>
                <button style={{ padding: '8px 14px', background: 'transparent', color: T.ink2, border: '1px solid var(--hairline)', borderRadius: 8, fontFamily: fB, fontSize: 13, cursor: 'pointer' }}>
                  保存草稿
                </button>
              </div>
              <div style={{ fontFamily: fM, fontSize: 10, color: T.ink3, letterSpacing: '0.05em', textAlign: 'center', marginTop: 4 }}>
                ⌘ + S 保存
              </div>
            </aside>
          </div>
        </div>
      );
    }

    function RecentMomentCard() {
      const m = MOMENTS[0];
      return (
        <div style={{
          background: m.isPinned ? '#f4e7d0' : T.card,
          border: m.isPinned ? '1px solid rgba(200,113,58,0.4)' : '1px solid var(--hairline)',
          borderRadius: 12, padding: '14px 16px', position: 'relative', cursor: 'pointer',
          width: 260, fontFamily: fS,
        }}>
          {m.isPinned && (
            <div style={{ position: 'absolute', top: -8, left: 12, display: 'inline-flex', alignItems: 'center', gap: 3, padding: '2px 7px', background: 'rgba(200,113,58,0.15)', border: '1px solid rgba(200,113,58,0.4)', borderRadius: 999, fontSize: 9, color: T.amber, fontFamily: fM, fontWeight: 600, letterSpacing: '0.12em' }}>
              <PinSvg /> PINNED
            </div>
          )}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 10, color: T.ink3, fontFamily: fM, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>
            <span>最近碎碎念</span>
            <span>·</span>
            <span>{m.volume}</span>
          </div>
          <p style={{
            margin: 0, fontFamily: fB, fontSize: 13, lineHeight: 1.7, color: T.ink,
            display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical', overflow: 'hidden',
          }}>
            {m.content}
          </p>
          <div style={{ marginTop: 10, fontSize: 10, color: T.ink3, fontFamily: fM, display: 'flex', alignItems: 'center', gap: 6 }}>
            {m.mood && <span>{m.mood}</span>}
            <span>{m.time}</span>
            <span style={{ marginLeft: 'auto', color: T.amber }}>→ /moments</span>
          </div>
        </div>
      );
    }

    function Panel({ label, sub, children }) {
      return (
        <div>
          <div className="panel-meta">
            <span className="label">{label}</span>
            <span className="sub">· {sub}</span>
            <span className="rule" />
          </div>
          {children}
        </div>
      );
    }

    function BrowserFrame({ url, children }) {
      return (
        <div className="browser-frame">
          <div className="browser-chrome">
            <span className="dot r" />
            <span className="dot y" />
            <span className="dot g" />
            <span className="url">{url}</span>
          </div>
          <div className="browser-body">{children}</div>
        </div>
      );
    }

    function App() {
      return (
        <div>
          <div className="page-header">
            <h1>碎碎念 / Moments · v1</h1>
            <span className="pill">SINGLE VARIANT · 橙皮书 + 活页夹</span>
            <p className="lede">
              紧扣设计系统已有的「文学手账」大盘，加入「活页纸」隐喻区分于博客的「装订书」——
              <strong>缩窄 max-w-2xl、左侧撕纸虚线、衬线 drop cap、卷序号、置顶用琥珀色别针</strong>。
              详情页最大胆的差异化是 <strong>writing-mode: vertical-rl 古籍竖排</strong>。
              所有色值沿用 <code>paper.css</code> 的 oklch token，无硬编码。
            </p>
          </div>

          <div className="canvas-row">
            <Panel label="/moments 列表页" sub="LIST · 4 cards · 1 pinned">
              <BrowserFrame url="kanocifer.chat/moments">
                <MomentListView />
              </BrowserFrame>
            </Panel>

            <Panel label="/moments/:id 详情页" sub="DETAIL · 竖排正文 + 右侧元数据">
              <BrowserFrame url="kanocifer.chat/moments/m-001">
                <MomentDetailView />
              </BrowserFrame>
            </Panel>
          </div>

          <div className="canvas-row">
            <Panel label="/admin/moments/new 编辑器" sub="EDITOR · 便签纸 textarea + 侧栏">
              <BrowserFrame url="kanocifer.chat/admin/moments/new">
                <MomentEditorView />
              </BrowserFrame>
            </Panel>

            <Panel label="RecentMomentCard 主页挂件" sub="WIDGET · EntryView 嵌入 · 260px">
              <div style={{ background: T.paper, padding: 32, position: 'relative', minHeight: 360, borderRadius: 8, overflow: 'hidden' }}>
                <div style={{ position: 'absolute', top: 32, left: 32, width: 220, height: 80, background: T.card, border: '1px solid var(--hairline)', borderRadius: 10, padding: 12, opacity: 0.5 }}>
                  <div style={{ fontFamily: fM, fontSize: 9, color: T.ink3, letterSpacing: '0.1em' }}>BENTO · 钓鱼地图</div>
                  <div style={{ marginTop: 6, fontFamily: fB, fontSize: 12, color: T.ink }}>当前气压 1012hPa</div>
                </div>
                <div style={{ position: 'absolute', top: 32, right: 32, width: 180, height: 80, background: T.card, border: '1px solid var(--hairline)', borderRadius: 10, padding: 12, opacity: 0.5 }}>
                  <div style={{ fontFamily: fM, fontSize: 9, color: T.ink3, letterSpacing: '0.1em' }}>BENTO · 待办</div>
                  <div style={{ marginTop: 6, fontFamily: fB, fontSize: 12, color: T.ink }}>2 项进行中</div>
                </div>
                <div style={{ position: 'absolute', bottom: 32, left: 32 }}>
                  <RecentMomentCard />
                </div>
                <div className="annotation" style={{ top: 6, right: 6 }}>EntryView 主页嵌入位</div>
              </div>
            </Panel>
          </div>

          <div className="legend">
            <strong>视觉合同 · 与博客（/blog）的核心差异</strong><br />
            · <code>max-w-2xl</code> 列表宽度（博客用 <code>max-w-6xl</code>）<br />
            · 左侧撕纸虚线（博客无）；<code>bg-warning/8</code> + 别针 pinned（博客用 primary 强调）<br />
            · drop cap 仅出现在碎碎念（博客是「章回标」+ 封面缩略）<br />
            · 详情页 writing-mode: vertical-rl（博客是横排阅读）<br />
            · 卷序号中文「卷三 / 卷二 / 卷一」是碎碎念专属（博客用公历日期）<br />
            · 所有颜色走 <code>paper.css</code> 的 oklch token，无 <code>bg-amber-400</code> 这类硬编码
          </div>

          <div className="footer-rule">
            <span>v1 · 橙皮书 + 活页夹</span>
            <span>1280 × desktop · paper theme</span>
            <span>✓ Phase 1 落地参考</span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
