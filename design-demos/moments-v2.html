<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>碎碎念 / Moments · 设计演示 · v2 (modal 模式)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <script
    src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    crossorigin="anonymous"
  ></script>
  <style>
    :root {
      --paper: oklch(0.97 0.013 50);
      --paper-2: oklch(0.95 0.018 50);
      --ink: #1a1613;
      --ink-2: #5b554a;
      --ink-3: #9a918a;
      --hairline: rgba(26, 22, 19, 0.12);
      --warm-gray: oklch(0.95 0.018 50);
      --accent-amber: #c8713a;
      --workspace-accent: #8a653f;
      --workspace-accent-soft: #f2e7db;
      --card-bg: oklch(0.99 0.008 50);
      --muted-text: #9a918a;
      --radius: 0.625rem;
      --font-disp: 'Newsreader', 'Noto Serif SC', 'Songti SC', serif;
      --font-body: 'Noto Serif SC', 'Newsreader', serif;
      --font-sans: 'Noto Sans SC', -apple-system, 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #d8cfbf; font-family: var(--font-body); color: var(--ink); }
    body { padding: 24px 24px 80px; min-height: 100vh; }
    .page-header { max-width: 1280px; margin: 0 auto 24px; }
    .page-header h1 { font-family: var(--font-disp); font-size: 28px; font-weight: 500; font-style: italic; margin: 0; letter-spacing: -0.01em; }
    .page-header .pill { display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 10px; border: 1px solid var(--ink); color: var(--ink); margin-left: 12px; vertical-align: middle; }
    .page-header .lede { font-size: 13px; color: var(--ink-2); max-width: 820px; line-height: 1.6; margin: 8px 0 0; }
    .canvas-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1280px; margin: 0 auto 32px; }
    .panel-meta { display: flex; align-items: baseline; gap: 10px; margin: 0 0 12px; padding-left: 8px; }
    .panel-meta .label { font-family: var(--font-disp); font-style: italic; font-size: 15px; color: var(--ink); }
    .panel-meta .sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
    .panel-meta .rule { flex: 1; height: 1px; background: var(--hairline); margin-left: 8px; }
    .browser-frame { background: var(--paper); border: 1px solid rgba(26,22,19,0.2); box-shadow: 0 18px 50px rgba(26,22,19,0.18), 0 0 0 1.5px rgba(26,22,19,0.08); border-radius: 8px; overflow: hidden; position: relative; }
    .browser-chrome { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #2a221b; }
    .browser-chrome .dot { width: 11px; height: 11px; border-radius: 50%; }
    .browser-chrome .dot.r { background: #ff5f57; }
    .browser-chrome .dot.y { background: #febc2e; }
    .browser-chrome .dot.g { background: #28c840; }
    .browser-chrome .url { flex: 1; font-family: var(--font-mono); font-size: 11px; color: #b0a89e; background: #14100d; padding: 4px 10px; border-radius: 4px; }
    .browser-body { background: var(--paper); position: relative; }
    .legend { background: var(--paper); border: 1px solid var(--hairline); padding: 16px 20px; margin: 32px auto 0; font-size: 12px; line-height: 1.8; color: var(--ink-2); max-width: 1280px; font-family: var(--font-body); }
    .legend strong { color: var(--ink); font-weight: 600; }
    .legend code { font-family: var(--font-mono); font-size: 11px; background: var(--warm-gray); padding: 1px 5px; border-radius: 2px; }
    .footer-rule { max-width: 1280px; margin: 40px auto 0; padding-top: 16px; border-top: 1px solid var(--hairline); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-3); display: flex; justify-content: space-between; }
    .modal-overlay { position: absolute; inset: 0; background: rgba(20,16,13,0.42); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-card { background: var(--card-bg); border: 1px solid var(--hairline); border-radius: 14px; box-shadow: 0 24px 70px rgba(26,22,19,0.35); width: 100%; max-width: 720px; max-height: 90%; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid var(--hairline); background: var(--card-bg); }
    .modal-body { overflow-y: auto; flex: 1; }
    .browser-frame.fixed-h { height: 820px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState } = React;

    const T = {
      paper: 'oklch(0.97 0.013 50)',
      card: 'oklch(0.99 0.008 50)',
      ink: '#1a1613',
      ink2: '#5b554a',
      ink3: '#9a918a',
      hairline: 'rgba(26, 22, 19, 0.12)',
      warmGray: 'oklch(0.95 0.018 50)',
      amber: '#c8713a',
      accent: '#8a653f',
      soft: '#f2e7db',
    };
    const fD = "'Newsreader','Noto Serif SC','Songti SC',serif";
    const fB = "'Noto Serif SC','Newsreader',serif";
    const fS = "'Noto Sans SC',-apple-system,sans-serif";
    const fM = "'JetBrains Mono','SF Mono',monospace";

    const MOMENTS = [
      { id:'m-001', volume:'卷三', mood:'🌿', time:'2026-06-17 18:24',
        content:'今天在湖边坐了一整个下午，没钓鱼，没读书，也没看手机。风把一本《万物静默如谜》的封面掀起来又放下，反复三次。我想，所谓「在出钓与阅读之间，留一片安静」，大概就是这个意思吧。',
        tags:['日常','钓鱼','随笔'], isPinned:true },
      { id:'m-002', volume:'卷二', mood:'☕', time:'2026-06-15 09:08',
        content:'早晨煮了一壶挂耳。书桌台灯下那杯咖啡的影子拉得很长，落在刚翻到一半的《追忆似水年华》上，普鲁斯特大概会同意我先喝完再读。',
        tags:['日常','阅读'], isPinned:false },
      { id:'m-003', volume:'卷一', mood:null, time:'2026-06-12 22:47',
        content:'读完北岛《时间的玫瑰》最后一首，关灯。窗外的城市把天空染成铁锈色。如果诗可以是一座城市的墓志铭，那这座城市一定死于自己。',
        tags:['书摘','诗'], isPinned:false },
      { id:'m-004', volume:'卷四', mood:'🌧', time:'2026-06-10 16:30',
        content:'广州入梅了。书房的木地板有一小块被花盆洇湿，形状像北海道。',
        tags:['天气','日常'], isPinned:false },
    ];

    function PinSvg() {
      return <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 2.25l2.6 4.95 5.4.6-4.05 3.7 1.1 5.45L12 14.1l-5.05 2.85 1.1-5.45-4.05-3.7 5.4-.6L12 2.25z" />
      </svg>;
    }
    function EditSvg() { return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" strokeLinejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>; }
    function TrashSvg() { return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>; }
    function CloseSvg() { return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>; }
    function ChevronSvg({ dir }) { return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" strokeLinejoin="round" d={dir==='left' ? "M15.75 19.5L8.25 12l7.5-7.5" : "M8.25 4.5l7.5 7.5-7.5 7.5"} /></svg>; }
    function PlusSvg() { return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>; }

    function MomentCard({ m, isAdmin = false, showEditOverlay = false }) {
      const firstChar = m.content.charAt(0);
      const rest = m.content.slice(1);
      return (
        <div style={{
          position: 'relative',
          background: m.isPinned ? '#f4e7d0' : T.card,
          border: m.isPinned ? '1px solid rgba(200,113,58,0.4)' : '1px solid var(--hairline)',
          borderRadius: 'calc(var(--radius) + 4px)',
          padding: '20px 22px 20px 26px',
          boxShadow: '0 1px 0 rgba(26,22,19,0.03), 0 1px 3px rgba(26,22,19,0.04)',
          cursor: 'pointer',
        }}>
          <div style={{ position:'absolute', top:12, bottom:12, left:10,
            borderLeft: m.isPinned ? '1.5px dashed rgba(200,113,58,0.55)' : '1.5px dashed var(--hairline)' }} />

          {m.isPinned && (
            <div style={{ position:'absolute', top:-10, left:22, display:'inline-flex', alignItems:'center', gap:4,
              padding:'3px 8px', background:'rgba(200,113,58,0.15)', border:'1px solid rgba(200,113,58,0.4)',
              borderRadius:999, fontSize:10, color:T.amber, fontFamily:fM, fontWeight:600, letterSpacing:'0.12em' }}>
              <PinSvg /> PINNED
            </div>
          )}

          {isAdmin && (
            <div style={{ position:'absolute', top:8, right:8, display:'flex', gap:4,
              opacity: showEditOverlay ? 1 : 0, transition: 'opacity 0.2s' }}>
              <button style={{ width:28, height:28, borderRadius:999, background:'rgba(255,250,245,0.95)',
                border:'1px solid var(--hairline)', display:'flex', alignItems:'center', justifyContent:'center',
                color: T.ink2, cursor:'pointer' }}>
                <EditSvg />
              </button>
              <button style={{ width:28, height:28, borderRadius:999, background:'rgba(255,250,245,0.95)',
                border:'1px solid var(--hairline)', display:'flex', alignItems:'center', justifyContent:'center',
                color: T.ink2, cursor:'pointer' }}>
                <TrashSvg />
              </button>
            </div>
          )}

          <div style={{ display:'flex', flexWrap:'wrap', alignItems:'center', gap:10,
            fontSize:11, color:T.ink2, fontFamily:fS, letterSpacing:'0.04em', paddingLeft:4 }}>
            <span style={{ fontFamily:fD, fontStyle:'italic', color:T.ink2, fontSize:13 }}>{m.volume}</span>
            <span style={{ color:T.ink3 }}>·</span>
            {m.mood && <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}><span style={{ fontSize:14 }}>{m.mood}</span></span>}
            {m.mood && <span style={{ color:T.ink3 }}>·</span>}
            <span style={{ fontFamily:fM, fontSize:10, color:T.ink3, letterSpacing:'0.05em' }}>{m.time}</span>
          </div>

          <p style={{ margin:'12px 0 0', paddingLeft:4, fontFamily:fB, fontSize:15, lineHeight:1.85, color:T.ink, letterSpacing:'0.01em',
            display:'-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
            <span style={{ fontFamily:fD, fontSize:'2.6em', float:'left', lineHeight:0.9, margin:'0.06em 0.10em -0.06em 0', fontWeight:600, color:T.accent }}>{firstChar}</span>
            {rest}
          </p>

          {m.tags.length > 0 && (
            <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginTop:14, paddingLeft:4 }}>
              {m.tags.map(t => (
                <span key={t} style={{ fontSize:11, fontFamily:fB, color:T.ink2, background:T.soft, padding:'2px 9px', borderRadius:999, border:'1px solid var(--hairline)' }}>#{t}</span>
              ))}
            </div>
          )}
        </div>
      );
    }

    function ListSection({ isAdmin, hoveringId }) {
      return (
        <div style={{ padding: '0 0 32px' }}>
          <div style={{ textAlign:'center', padding:'36px 24px 24px' }}>
            <div style={{ display:'inline-flex', alignItems:'center', gap:12, color:T.ink3, fontFamily:fM, fontSize:10, letterSpacing:'0.25em', textTransform:'uppercase', marginBottom:14 }}>
              <span style={{ width:24, height:1, background:T.ink3 }} />
              kanocifer
              <span style={{ width:24, height:1, background:T.ink3 }} />
            </div>
            <h1 style={{ fontFamily:fD, fontSize:64, fontWeight:500, fontStyle:'italic', margin:0, color:T.ink, letterSpacing:'-0.02em', lineHeight:0.95 }}>碎碎念</h1>
            <div style={{ marginTop:14, display:'inline-flex', alignItems:'center', gap:8, padding:'5px 14px', background:T.card, border:'1px solid var(--hairline)', borderRadius:999, fontSize:11, color:T.ink2 }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:T.amber }} />
              卷 · 2026
            </div>
          </div>

          <div style={{ maxWidth:640, margin:'0 auto', padding:'0 24px' }}>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:18, alignItems:'center' }}>
              <span style={{ fontFamily:fM, fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase', color:T.ink3, marginRight:6 }}>filter</span>
              <button style={{ padding:'4px 12px', borderRadius:999, fontSize:12, fontFamily:fB, background:T.amber, color:'#fffaf5', border:`1px solid ${T.amber}`, cursor:'pointer', fontWeight:500 }}>全部</button>
              <button style={{ padding:'4px 12px', borderRadius:999, fontSize:12, fontFamily:fB, background:T.card, color:T.ink2, border:'1px solid var(--hairline)', cursor:'pointer' }}>#日常</button>
              <button style={{ padding:'4px 12px', borderRadius:999, fontSize:12, fontFamily:fB, background:T.card, color:T.ink2, border:'1px solid var(--hairline)', cursor:'pointer' }}>#钓鱼</button>
              <button style={{ padding:'4px 12px', borderRadius:999, fontSize:12, fontFamily:fB, background:T.card, color:T.ink2, border:'1px solid var(--hairline)', cursor:'pointer' }}>#诗</button>
            </div>

            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
              {MOMENTS.map((m, i) => (
                <MomentCard key={m.id} m={m} isAdmin={isAdmin} showEditOverlay={hoveringId === m.id} />
              ))}
            </div>

            <div style={{ marginTop:24, display:'flex', alignItems:'center', justifyContent:'space-between', fontFamily:fM, fontSize:11, color:T.ink3, letterSpacing:'0.08em' }}>
              <span>第 1 / 1 卷</span>
              <span style={{ color:T.ink2 }}>·</span>
              <span>共 4 条</span>
            </div>
          </div>

          {isAdmin && (
            <button style={{ position:'absolute', right:24, bottom:24,
              background:T.amber, color:'#fffaf5', border:'none', borderRadius:999,
              padding:'12px 22px', fontSize:13, fontWeight:500, fontFamily:fB,
              display:'inline-flex', alignItems:'center', gap:6, cursor:'pointer',
              boxShadow:'0 10px 25px rgba(200,113,58,0.35), 0 4px 10px rgba(26,22,19,0.15)' }}>
              <PlusSvg /> 写一句
            </button>
          )}
        </div>
      );
    }

    function DetailModal({ m, withEditButton }) {
      return (
        <div className="modal-overlay">
          <div className="modal-card">
            <div className="modal-header" style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <span style={{ fontFamily:fD, fontStyle:'italic', fontSize:14, color:T.ink2 }}>{m.volume}</span>
                <span style={{ color:T.ink3 }}>·</span>
                <span style={{ fontFamily:fM, fontSize:11, color:T.ink3 }}>{m.time}</span>
                {m.isPinned && (
                  <span style={{ display:'inline-flex', alignItems:'center', gap:4, color:T.amber, fontSize:10, fontWeight:600, letterSpacing:'0.18em', textTransform:'uppercase', fontFamily:fM }}>
                    <PinSvg /> 置顶
                  </span>
                )}
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <button style={{ width:28, height:28, borderRadius:999, background:'transparent', border:'1px solid var(--hairline)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:T.ink2 }}><ChevronSvg dir="left" /></button>
                <button style={{ width:28, height:28, borderRadius:999, background:'transparent', border:'1px solid var(--hairline)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:T.ink2 }}><ChevronSvg dir="right" /></button>
                {withEditButton && (
                  <>
                    <button style={{ background:T.amber, color:'#fffaf5', border:'none', borderRadius:999, padding:'6px 14px', fontSize:12, fontWeight:500, fontFamily:fB, display:'inline-flex', alignItems:'center', gap:4, cursor:'pointer', marginLeft:6 }}>
                      <EditSvg /> 编辑
                    </button>
                    <button style={{ width:28, height:28, borderRadius:999, background:'transparent', border:'1px solid var(--hairline)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:T.ink2 }}><TrashSvg /></button>
                  </>
                )}
                <button style={{ width:28, height:28, borderRadius:999, background:'transparent', border:'1px solid var(--hairline)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:T.ink2 }}><CloseSvg /></button>
              </div>
            </div>

            <div className="modal-body" style={{ display:'grid', gridTemplateColumns:'minmax(0, 1fr) 200px' }}>
              <div style={{ padding:'24px 28px' }}>
                {m.mood && (
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:18, fontFamily:fS, color:T.ink2, fontSize:13 }}>
                    <span style={{ fontSize:22 }}>{m.mood}</span>
                  </div>
                )}
                <div style={{ fontFamily:fB, fontSize:16, lineHeight:1.95, color:T.ink, textWrap:'pretty', whiteSpace:'pre-wrap' }}>
                  {m.content}
                </div>
                {m.tags.length > 0 && (
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginTop:24 }}>
                    {m.tags.map(t => (
                      <span key={t} style={{ fontSize:11, fontFamily:fB, color:T.ink2, background:T.soft, padding:'3px 10px', borderRadius:999, border:'1px solid var(--hairline)' }}>#{t}</span>
                    ))}
                  </div>
                )}
                <div style={{ marginTop:28, paddingTop:14, borderTop:'1px dashed var(--hairline)', fontFamily:fM, fontSize:10, color:T.ink3, letterSpacing:'0.05em', display:'flex', gap:16, flexWrap:'wrap' }}>
                  <span>发布于 {m.time}</span>
                  <span>·</span>
                  <span>允许评论 是</span>
                </div>
              </div>

              <aside style={{ background:'rgba(242,231,219,0.4)', borderLeft:'1px solid var(--hairline)', padding:'24px 18px' }}>
                <div style={{ fontFamily:fM, fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:T.ink3 }}>META</div>
                <dl style={{ marginTop:14, display:'flex', flexDirection:'column', gap:12, fontSize:13 }}>
                  <dt style={{ fontFamily:fM, fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase', color:T.ink3 }}>卷序</dt>
                  <dd style={{ fontFamily:fM, fontSize:12, color:T.ink, margin:0 }}>{m.volume}</dd>
                  <dt style={{ fontFamily:fM, fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase', color:T.ink3, marginTop:4 }}>标签</dt>
                  <dd style={{ fontFamily:fB, fontSize:12, color:T.ink, margin:0 }}>{m.tags.join(' · ')}</dd>
                  <dt style={{ fontFamily:fM, fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase', color:T.ink3, marginTop:4 }}>可见性</dt>
                  <dd style={{ fontFamily:fB, fontSize:12, color:T.ink, margin:0 }}>公开</dd>
                  <dt style={{ fontFamily:fM, fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase', color:T.ink3, marginTop:4 }}>状态</dt>
                  <dd style={{ fontFamily:fB, fontSize:12, color:T.ink, margin:0 }}>已发布</dd>
                </dl>
                <div style={{ fontFamily:fM, fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:T.ink3, marginTop:20, borderTop:'1px dashed var(--hairline)', paddingTop:14 }}>KEYBOARD</div>
                <ul style={{ marginTop:10, display:'flex', flexDirection:'column', gap:6, fontSize:11, color:T.ink2, fontFamily:fS }}>
                  <li style={{ display:'flex', alignItems:'center', gap:8 }}>
