<!doctype html>
<html lang="zh" data-color-scheme="paper">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevTasks Workspace · Prototype</title>
    <style>
      /* ============================================================
         1. THEME TOKENS — paper (default) + dark variant
         Source: DESIGN.md §2, packages/brand/themes/index.css
         ============================================================ */
      :root {
        /* paper · light */
        --ink: oklch(0.2 0.018 50);
        --paper: oklch(0.97 0.013 50);
        --surface: oklch(0.97 0.013 50 / 0.75);
        --warm-gray: oklch(0.95 0.018 50);
        --secondary: oklch(0.92 0.022 50);
        --muted-text: oklch(0.42 0.015 50);
        --accent: oklch(0.5 0.08 50);
        --accent-slate: oklch(0.55 0.025 245);
        --accent-rose: oklch(0.58 0.13 28);
        --border-color: oklch(0.88 0.02 50);
        --accent-contrast: oklch(0.99 0.003 50);
        --chart-1: oklch(0.6 0.14 50);
        --chart-2: oklch(0.55 0.08 145);
        --chart-3: oklch(0.55 0.025 245);
        --chart-4: oklch(0.58 0.13 28);
        --chart-5: oklch(0.7 0.13 85);
        --gradient-primary-from: oklch(0.5 0.08 50);
        --gradient-primary-to: oklch(0.6 0.14 50);
        --gradient-decorative-from: oklch(0.92 0.025 50);
        --gradient-decorative-to: oklch(0.78 0.06 50);

        /* semantic aliases (mirror base.css @theme inline) */
        --bg: var(--paper);
        --fg: var(--ink);
        --muted: var(--warm-gray);
        --muted-fg: var(--muted-text);
        --border: var(--border-color);
        --primary: var(--accent);
        --primary-fg: var(--accent-contrast);
        --ring: var(--accent-slate);
        --destructive: oklch(0.577 0.245 27);
        --success: oklch(0.696 0.17 162);
        --warning: oklch(0.769 0.188 70);

        /* typography */
        --font-display: 'Averia Gruesa Libre', system-ui, sans-serif;
        --font-display-cjk: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        --font-serif: ui-serif, Georgia, Cambria, 'Times New Roman', serif;
        --font-sans:
          'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system,
          'Segoe UI', sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;

        /* radius */
        --radius-sm: 0.375rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.625rem;
        --radius-xl: 0.875rem;
        --radius-2xl: 1.125rem;
        --radius-3xl: 1.375rem;
        --radius-squircle: 3rem;

        /* layered shadow (DESIGN.md §4) */
        --shadow-card:
          0 1px 1px color-mix(in oklch, var(--ink) 6%, transparent),
          0 6px 14px color-mix(in oklch, var(--ink) 10%, transparent),
          0 18px 32px color-mix(in oklch, var(--ink) 8%, transparent);
        --shadow-card-hover:
          0 2px 2px color-mix(in oklch, var(--ink) 7%, transparent),
          0 10px 22px color-mix(in oklch, var(--ink) 12%, transparent),
          0 24px 40px color-mix(in oklch, var(--ink) 10%, transparent);
        --shadow-inset-highlight: inset 0 1px 0 0
          oklch(from var(--paper) l c h / 0.6);
        --shadow-panel: 0 12px 32px
          color-mix(in oklch, var(--ink) 10%, transparent);
      }

      .dark {
        --ink: oklch(0.94 0.013 50);
        --paper: oklch(0.22 0.018 50);
        --surface: oklch(0.28 0.018 50 / 0.85);
        --warm-gray: oklch(0.36 0.018 50);
        --secondary: oklch(0.42 0.022 50);
        --muted-text: oklch(0.78 0.015 50);
        --accent: oklch(0.74 0.1 50);
        --accent-slate: oklch(0.74 0.08 245);
        --accent-rose: oklch(0.74 0.11 28);
        --border-color: oklch(0.3 0.02 50);
        --accent-contrast: oklch(0.22 0.018 50);
        --chart-1: oklch(0.74 0.1 50);
        --chart-2: oklch(0.74 0.1 145);
        --chart-3: oklch(0.74 0.08 245);
        --chart-4: oklch(0.74 0.11 28);
        --chart-5: oklch(0.78 0.1 85);
        --gradient-primary-from: oklch(0.74 0.1 50);
        --gradient-primary-to: oklch(0.6 0.14 50);
        --gradient-decorative-from: oklch(0.3 0.025 50);
        --gradient-decorative-to: oklch(0.45 0.06 50);
      }

      /* ============================================================
         2. RESET & BASE
         ============================================================ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family: var(--font-sans);
        font-size: 0.9375rem;
        line-height: 1.65;
        color: var(--fg);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }
      button:disabled {
        cursor: not-allowed;
      }
      input,
      textarea,
      select {
        font-family: inherit;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      /* focus ring (DESIGN.md §5 buttons) */
      :focus-visible {
        outline: 3px solid color-mix(in oklch, var(--ring) 50%, transparent);
        outline-offset: 2px;
        border-radius: var(--radius-sm);
      }

      /* ============================================================
         3. LAYOUT SHELL
         ============================================================ */
      .workspace {
        display: flex;
        flex-direction: column;
        height: 100vh;
        min-height: 100vh;
        background: var(--bg);
      }

      /* ── page header ── */
      .page-header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 1.25rem 2rem 0;
        background: color-mix(in oklch, var(--bg) 85%, transparent);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
      }
      .page-header__title {
        font-family: var(--font-serif);
        font-size: 1.5rem;
        font-weight: 500;
        letter-spacing: -0.01em;
        color: var(--fg);
        line-height: 1.2;
      }
      .page-header__subtitle {
        font-size: 0.8125rem;
        color: var(--muted-fg);
        margin-top: 0.125rem;
      }
      .page-header__right {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding-bottom: 0.25rem;
      }

      /* ── tab bar ── */
      .tab-bar {
        display: flex;
        gap: 0.25rem;
        padding: 0.375rem;
        background: var(--muted);
        border-radius: var(--radius-lg);
      }
      .tab-bar__btn {
        position: relative;
        padding: 0.4375rem 1.125rem;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--muted-fg);
        border-radius: var(--radius-md);
        transition:
          color 180ms ease-out,
          background 180ms ease-out;
        white-space: nowrap;
      }
      .tab-bar__btn:hover {
        color: var(--fg);
      }
      .tab-bar__btn[aria-selected='true'] {
        color: var(--fg);
        background: var(--bg);
        box-shadow:
          0 1px 2px color-mix(in oklch, var(--ink) 6%, transparent),
          var(--shadow-inset-highlight);
      }
      .tab-bar__count {
        display: inline-block;
        min-width: 1.25rem;
        padding: 0 0.375rem;
        margin-left: 0.375rem;
        font-size: 0.6875rem;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        text-align: center;
        color: var(--muted-fg);
        background: color-mix(in oklch, var(--muted-fg) 12%, transparent);
        border-radius: 9999px;
        line-height: 1.4;
      }
      .tab-bar__btn[aria-selected='true'] .tab-bar__count {
        color: var(--fg);
        background: color-mix(in oklch, var(--primary) 18%, transparent);
      }

      /* ── primary button ── */
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--primary-fg);
        background: var(--primary);
        border-radius: var(--radius-md);
        transition: filter 180ms ease-out;
      }
      .btn-primary:hover {
        filter: brightness(0.92);
      }
      .btn-primary svg {
        width: 1rem;
        height: 1rem;
      }

      /* ── main scroll area ── */
      .workspace__body {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem 2rem 3rem;
      }
      .workspace__body > .tab-panel {
        display: none;
      }
      .workspace__body > .tab-panel[aria-hidden='false'] {
        display: block;
      }

      /* ============================================================
         4. SECTION / HEADING
         ============================================================ */
      .section + .section {
        margin-top: 2rem;
      }
      .section__head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 0.875rem;
      }
      .section__title {
        font-family: var(--font-serif);
        font-size: 1.0625rem;
        font-weight: 500;
        color: var(--fg);
        letter-spacing: -0.005em;
      }
      .section__hint {
        font-size: 0.75rem;
        color: var(--muted-fg);
      }

      /* ============================================================
         5. TASK CARD (frontier / list)
         ============================================================ */
      .card {
        position: relative;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 1rem 1.125rem;
        box-shadow: var(--shadow-card);
        transition:
          box-shadow 200ms ease-out,
          transform 200ms ease-out;
        cursor: pointer;
      }
      .card:hover {
        box-shadow: var(--shadow-card-hover);
        transform: translateY(-1px);
      }
      .card__top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.375rem;
        margin-bottom: 0.5rem;
      }
      .card__title {
        font-size: 0.9375rem;
        font-weight: 500;
        color: var(--fg);
        line-height: 1.4;
      }
      .card__desc {
        font-size: 0.8125rem;
        color: var(--muted-fg);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card__bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      .card__meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.6875rem;
        color: var(--muted-fg);
      }
      .card__actions {
        display: flex;
        align-items: center;
        gap: 0.125rem;
        opacity: 0;
        transition: opacity 180ms ease-out;
      }
      .card:hover .card__actions {
        opacity: 1;
      }
      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.75rem;
        height: 1.75rem;
        color: var(--muted-fg);
        border-radius: var(--radius-md);
        transition:
          color 150ms ease-out,
          background 150ms ease-out;
      }
      .icon-btn:hover {
        color: var(--primary);
        background: var(--muted);
      }
      .icon-btn--danger:hover {
        color: var(--destructive);
        background: color-mix(in oklch, var(--destructive) 10%, transparent);
      }
      .icon-btn svg {
        width: 0.9375rem;
        height: 0.9375rem;
      }

      /* ── badge / chip ── */
      .badge {
        display: inline-block;
        padding: 0.0625rem 0.5rem;
        font-size: 0.6875rem;
        font-weight: 500;
        line-height: 1.5;
        border: 1px solid transparent;
        border-radius: 9999px;
        white-space: nowrap;
      }
      .badge--type-problem {
        color: oklch(0.45 0.12 28);
        background: color-mix(in oklch, var(--accent-rose) 12%, transparent);
        border-color: color-mix(in oklch, var(--accent-rose) 25%, transparent);
      }
      .badge--type-feature {
        color: oklch(0.45 0.1 245);
        background: color-mix(in oklch, var(--accent-slate) 12%, transparent);
        border-color: color-mix(in oklch, var(--accent-slate) 25%, transparent);
      }
      .badge--type-polish {
        color: oklch(0.45 0.1 85);
        background: color-mix(in oklch, var(--chart-5) 14%, transparent);
        border-color: color-mix(in oklch, var(--chart-5) 28%, transparent);
      }
      .badge--type-debt {
        color: oklch(0.45 0.1 290);
        background: color-mix(in oklch, var(--chart-4) 12%, transparent);
        border-color: color-mix(in oklch, var(--chart-4) 25%, transparent);
      }
      .badge--priority-p0 {
        color: var(--destructive);
        background: color-mix(in oklch, var(--destructive) 12%, transparent);
        border-color: color-mix(in oklch, var(--destructive) 30%, transparent);
      }
      .badge--priority-p1 {
        color: oklch(0.5 0.12 70);
        background: color-mix(in oklch, var(--warning) 14%, transparent);
        border-color: color-mix(in oklch, var(--warning) 30%, transparent);
      }
      .badge--priority-p2 {
        color: var(--muted-fg);
        border-color: var(--border);
      }
      .badge--priority-p3 {
        color: var(--muted-fg);
        border-color: var(--border);
        opacity: 0.7;
      }
      .badge--scope {
        color: var(--muted-fg);
        border-color: var(--border);
      }
      .badge--slug {
        color: var(--primary);
        background: color-mix(in oklch, var(--primary) 10%, transparent);
      }

      /* ── status chip (clickable) ── */
      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.1875rem 0.625rem;
        font-size: 0.6875rem;
        font-weight: 500;
        border: 1px solid var(--border);
        border-radius: 9999px;
        color: var(--muted-fg);
        background: transparent;
        transition:
          color 150ms ease-out,
          background 150ms ease-out,
          border-color 150ms ease-out;
      }
      .status-chip:hover {
        color: var(--fg);
        border-color: color-mix(in oklch, var(--primary) 40%, transparent);
      }
      .status-chip::before {
        content: '';
        width: 0.4375rem;
        height: 0.4375rem;
        border-radius: 9999px;
        background: currentColor;
        opacity: 0.5;
      }
      .status-chip--todo::before {
        background: var(--muted-fg);
      }
      .status-chip--scheduled::before {
        background: var(--chart-3);
      }
      .status-chip--in-progress::before {
        background: var(--chart-1);
      }
      .status-chip--on-hold::before {
        background: var(--warning);
      }
      .status-chip--done::before {
        background: var(--success);
      }

      /* ============================================================
         6. FRONTIER GRID
         ============================================================ */
      .frontier-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 0.875rem;
      }
      .frontier-grid .card {
        display: flex;
        flex-direction: column;
        min-height: 8.5rem;
      }
      .frontier-grid .card__desc {
        flex: 1;
      }

      /* ── list rows (进行中 / 已完成) ── */
      .task-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .task-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.625rem 1rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        cursor: pointer;
        transition:
          box-shadow 180ms ease-out,
          background 180ms ease-out;
      }
      .task-row:hover {
        box-shadow: var(--shadow-card);
      }
      .task-row__title {
        flex: 1;
        min-width: 0;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--fg);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .task-row__badges {
        display: flex;
        align-items: center;
        gap: 0.375rem;
        flex-shrink: 0;
      }
      .task-row__actions {
        display: flex;
        align-items: center;
        gap: 0.125rem;
        flex-shrink: 0;
        opacity: 0;
        transition: opacity 180ms ease-out;
      }
      .task-row:hover .task-row__actions {
        opacity: 1;
      }

      /* ============================================================
         7. FILTER BAR (规划 tab)
         ============================================================ */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        padding: 0.875rem 1rem;
        background: var(--muted);
        border-radius: var(--radius-xl);
        margin-bottom: 1rem;
      }
      .filter-bar__label {
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted-fg);
        margin-right: 0.25rem;
      }
      .filter-chip {
        padding: 0.25rem 0.625rem;
        font-size: 0.75rem;
        color: var(--muted-fg);
        border: 1px solid var(--border);
        border-radius: 9999px;
        background: transparent;
        transition:
          color 150ms ease-out,
          background 150ms ease-out,
          border-color 150ms ease-out;
      }
      .filter-chip:hover {
        color: var(--fg);
      }
      .filter-chip[aria-pressed='true'] {
        color: var(--primary);
        background: color-mix(in oklch, var(--primary) 10%, transparent);
        border-color: color-mix(in oklch, var(--primary) 35%, transparent);
      }
      .filter-bar__count {
        margin-left: auto;
        font-size: 0.75rem;
        color: var(--muted-fg);
        font-variant-numeric: tabular-nums;
      }

      /* ── planning table ── */
      .plan-table {
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        overflow: hidden;
      }
      .plan-table__row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr 100px 32px;
        align-items: center;
        gap: 0.75rem;
        padding: 0.625rem 1rem;
        border-top: 1px solid var(--border);
        cursor: pointer;
        transition: background 150ms ease-out;
      }
      .plan-table__row:first-child {
        border-top: none;
        background: var(--muted);
        cursor: default;
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted-fg);
      }
      .plan-table__row:not(:first-child):hover {
        background: color-mix(in oklch, var(--muted) 50%, transparent);
      }
      .plan-table__title {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--fg);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .plan-table__meta {
        font-size: 0.8125rem;
        color: var(--muted-fg);
      }

      /* ============================================================
         8. STATS (回顾 tab)
         ============================================================ */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
      }
      .stat-card {
        padding: 1.125rem 1.25rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-card);
      }
      .stat-card__label {
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted-fg);
      }
      .stat-card__value {
        font-family: var(--font-display);
        font-size: 2.25rem;
        font-weight: 400;
        color: var(--fg);
        line-height: 1.1;
        margin-top: 0.375rem;
        letter-spacing: -0.02em;
      }
      .stat-card__delta {
        font-size: 0.75rem;
        color: var(--success);
        margin-top: 0.25rem;
      }

      /* ── type distribution bars ── */
      .dist-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .dist-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .dist-row__label {
        width: 4.5rem;
        flex-shrink: 0;
        font-size: 0.8125rem;
        color: var(--fg);
      }
      .dist-row__track {
        flex: 1;
        height: 0.5rem;
        background: var(--muted);
        border-radius: 9999px;
        overflow: hidden;
      }
      .dist-row__fill {
        height: 100%;
        border-radius: 9999px;
        transform-origin: left;
        transition: transform 400ms ease-out;
      }
      .dist-row__count {
        width: 2rem;
        flex-shrink: 0;
        text-align: right;
        font-size: 0.75rem;
        color: var(--muted-fg);
        font-variant-numeric: tabular-nums;
      }

      /* ── completed timeline ── */
      .timeline {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .timeline__item {
        display: flex;
        gap: 0.875rem;
        padding: 0.625rem 0;
        border-bottom: 1px solid var(--border);
      }
      .timeline__dot {
        width: 0.5rem;
        height: 0.5rem;
        margin-top: 0.5rem;
        flex-shrink: 0;
        border-radius: 9999px;
        background: var(--success);
      }
      .timeline__content {
        flex: 1;
      }
      .timeline__title {
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--muted-fg);
        text-decoration: line-through;
      }
      .timeline__date {
        font-size: 0.6875rem;
        color: var(--muted-fg);
        margin-top: 0.125rem;
        font-variant-numeric: tabular-nums;
      }

      /* ============================================================
         9. SLIDE-OUT DETAIL PANEL
         ============================================================ */
      .panel-overlay {
        position: fixed;
        inset: 0;
        z-index: 9998;
        background: oklch(0 0 0 / 0.35);
        backdrop-filter: blur(6px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 200ms ease-out;
      }
      .panel-overlay[data-open='true'] {
        opacity: 1;
        pointer-events: auto;
      }
      .detail-panel {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 9999;
        width: min(420px, 100vw);
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        border-left: 1px solid var(--border);
        box-shadow: var(--shadow-panel);
        transform: translateX(100%);
        transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .detail-panel[data-open='true'] {
        transform: translateX(0);
      }
      .detail-panel__header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .detail-panel__title {
        font-family: var(--font-serif);
        font-size: 1.0625rem;
        font-weight: 500;
        color: var(--fg);
        line-height: 1.3;
        word-break: break-word;
      }
      .detail-panel__close {
        width: 2rem;
        height: 2rem;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--muted-fg);
        border-radius: var(--radius-md);
        transition:
          color 150ms ease-out,
          background 150ms ease-out;
      }
      .detail-panel__close:hover {
        color: var(--fg);
        background: var(--muted);
      }
      .detail-panel__close svg {
        width: 1.125rem;
        height: 1.125rem;
      }
      .detail-panel__body {
        flex: 1;
        overflow-y: auto;
        padding: 1.25rem 1.5rem;
      }
      .detail-panel__footer {
        flex-shrink: 0;
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      /* ── field group ── */
      .field {
        margin-bottom: 1.25rem;
      }
      .field__label {
        display: block;
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted-fg);
        margin-bottom: 0.375rem;
      }
      .field__value {
        font-size: 0.875rem;
        color: var(--fg);
        line-height: 1.55;
        white-space: pre-wrap;
      }
      .field__value--muted {
        color: var(--muted-fg);
        font-style: italic;
      }
      .field__hint {
        font-size: 0.6875rem;
        color: var(--muted-fg);
        margin-top: 0.25rem;
      }

      /* ── status selector ── */
      .status-selector {
        display: flex;
        flex-wrap: wrap;
        gap: 0.375rem;
      }
      .status-selector__btn {
        padding: 0.3125rem 0.75rem;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--muted-fg);
        border: 1px solid var(--border);
        border-radius: 9999px;
        transition:
          color 150ms ease-out,
          background 150ms ease-out,
          border-color 150ms ease-out;
      }
      .status-selector__btn:hover {
        color: var(--fg);
      }
      .status-selector__btn[aria-pressed='true'] {
        color: var(--primary);
        background: color-mix(in oklch, var(--primary) 10%, transparent);
        border-color: color-mix(in oklch, var(--primary) 35%, transparent);
      }

      /* ── inline confirm bar ── */
      .confirm-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.625rem 0.75rem;
        background: color-mix(in oklch, var(--destructive) 8%, transparent);
        border: 1px solid
          color-mix(in oklch, var(--destructive) 25%, transparent);
        border-radius: var(--radius-lg);
        font-size: 0.8125rem;
        color: var(--destructive);
      }
      .confirm-bar__btn {
        padding: 0.25rem 0.625rem;
        font-size: 0.75rem;
        font-weight: 500;
        border-radius: var(--radius-sm);
        transition: background 150ms ease-out;
      }
      .confirm-bar__btn--confirm {
        color: var(--primary-fg);
        background: var(--destructive);
      }
      .confirm-bar__btn--cancel {
        color: var(--muted-fg);
      }

      /* ── destructive button ── */
      .btn-danger {
        padding: 0.4375rem 0.875rem;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--destructive);
        background: transparent;
        border-radius: var(--radius-md);
        transition: background 150ms ease-out;
      }
      .btn-danger:hover {
        background: color-mix(in oklch, var(--destructive) 10%, transparent);
      }

      /* ============================================================
         10. EMPTY STATE
         ============================================================ */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 3rem 1.5rem;
        color: var(--muted-fg);
      }
      .empty-state__icon {
        width: 3rem;
        height: 3rem;
        margin-bottom: 0.75rem;
        color: color-mix(in oklch, var(--muted-fg) 50%, transparent);
      }
      .empty-state__title {
        font-family: var(--font-serif);
        font-size: 1.0625rem;
        font-weight: 500;
        color: var(--fg);
      }
      .empty-state__hint {
        font-size: 0.8125rem;
        margin-top: 0.25rem;
      }

      /* ============================================================
         11. SKELETON
         ============================================================ */
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--muted) 0%,
          color-mix(in oklch, var(--muted) 70%, var(--bg)) 50%,
          var(--muted) 100%
        );
        background-size: 200% 100%;
        animation: skeleton-pulse 1.8s ease-in-out infinite;
        border-radius: var(--radius-md);
      }
      @keyframes skeleton-pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.7;
        }
      }

      /* ============================================================
         12. THEME TOGGLE (prototype-only)
         ============================================================ */
      .theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.25rem;
        height: 2.25rem;
        color: var(--muted-fg);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        transition:
          color 150ms ease-out,
          background 150ms ease-out;
      }
      .theme-toggle:hover {
        color: var(--fg);
        background: var(--muted);
      }
      .theme-toggle svg {
        width: 1rem;
        height: 1rem;
      }

      /* ============================================================
         13. SCROLLBAR
         ============================================================ */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted-fg);
      }

      /* reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* ── responsive ── */
      @media (max-width: 768px) {
        .page-header {
          padding: 1rem 1rem 0;
        }
        .workspace__body {
          padding: 1rem 1rem 2rem;
        }
        .plan-table__row {
          grid-template-columns: 1fr 60px 32px;
        }
        .plan-table__row > .plan-table__meta:nth-child(n + 3) {
          display: none;
        }
        .detail-panel {
          width: 100vw;
        }
      }
    </style>
  </head>
  <body>
    <!-- ============================================================
         PROTOTYPE SHELL — DevTasks Workspace
         ============================================================ -->
    <div id="workspace" class="workspace">
      <!-- ── page header ── -->
      <header class="page-header">
        <div>
          <h1 class="page-header__title">开发任务</h1>
          <p class="page-header__subtitle">网站开发需求与实现清单</p>
        </div>
        <div class="page-header__right">
          <nav class="tab-bar" role="tablist" aria-label="工作台视角">
            <button
              class="tab-bar__btn"
              role="tab"
              data-tab="frontier"
              aria-selected="true"
            >
              推进<span class="tab-bar__count" data-count="frontier">0</span>
            </button>
            <button
              class="tab-bar__btn"

              aria-selected="false"
            >
              规划<span class="tab-bar__count" data-count="planning">0</span>
            </button>
            <button
              class="tab-bar__btn"
              role="tab"
              data-tab="review"
              aria-selected="false"
            >
              回顾<span class="tab-bar__count" data-count="review">0</span>
            </button>
          </nav>
          <button id="btn-create" class="btn-primary" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              />
            </svg>
            新建任务
          </button>
          <button
            id="theme-toggle"
            class="theme-toggle"
            type="button"
            aria-label="切换深色模式"
            title="切换深色 / 浅色"
          >
            <svg
              id="theme-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- ── main content ── -->
      <main class="workspace__body">
        <!-- ──── 推进 (frontier) ──── -->
        <section
          class="tab-panel"
          role="tabpanel"
          data-panel="frontier"
          aria-hidden="false"
        >
          <!-- frontier cards -->
          <div class="section" data-section="frontier">
            <div class="section__head">
              <h2 class="section__title">现在能做什么</h2>
              <span class="section__hint">无阻塞 · 按优先级与截止日排序</span>
            </div>
            <div id="frontier-grid" class="frontier-grid"></div>
          </div>

          <!-- in-progress -->
          <div class="section" data-section="in-progress">
            <div class="section__head">
              <h2 class="section__title">进行中</h2>
              <span class="section__hint">正在推进的任务</span>
            </div>
            <div id="in-progress-list" class="task-list"></div>
          </div>

          <!-- done this week -->
          <div class="section" data-section="done-recent">
            <div class="section__head">
              <h2 class="section__title">本周已完成</h2>
              <span class="section__hint">最近关闭的任务</span>
            </div>
            <div id="done-list" class="task-list"></div>
          </div>
        </section>

        <!-- ──── 规划 (planning) ──── -->
        <section
          class="tab-panel"
          role="tabpanel"
          data-panel="planning"
          aria-hidden="true"
        >
          <div class="filter-bar" role="group" aria-label="筛选条件">
            <span class="filter-bar__label">类型</span>
            <button
              class="filter-chip"
              data-filter="type"
              data-value="功能需求"
              aria-pressed="false"
            >
              功能需求
            </button>
            <button
              class="filter-chip"
              data-filter="type"
              data-value="问题"
              aria-pressed="false"
            >
              问题
            </button>
            <button
              class="filter-chip"
              data-filter="type"
              data-value="优化"
              aria-pressed="false"
            >
              优化
            </button>
            <button
              class="filter-chip"
              data-filter="type"
              data-value="技术债"
              aria-pressed="false"
            >
              技术债
            </button>
            <span
              style="width: 1px; height: 1rem; background: var(--border)"
            ></span>
            <span class="filter-bar__label">优先级</span>
            <button
              class="filter-chip"
              data-filter="priority"
              data-value="P0 紧急"
              aria-pressed="false"
            >
              P0
            </button>
            <button
              class="filter-chip"
              data-filter="priority"
              data-value="P1 高"
              aria-pressed="false"
            >
              P1
            </button>
            <button
              class="filter-chip"
              data-filter="priority"
              data-value="P2 中"
              aria-pressed="false"
            >
              P2
            </button>
            <button
              class="filter-chip"
              data-filter="priority"
              data-value="P3 低"
              aria-pressed="false"

              P3
            </button>
            <span class="filter-bar__count" id="plan-count">0 项</span>
          </div>

          <div class="plan-table" id="plan-table">
            <div class="plan-table__row">
              <span>标题</span>
              <span>类型</span>
              <span>优先级</span>
              <span>范围</span>

        <!-- ──── 回顾 (review) ──── -->

          role="tabpanel"
          data-panel="review"
          aria-hidden="true"

                <div class="stat-card__value" id="stat-urgent">0</div>

          <div class="section">

          <div class="section">

              <h2 class="section__title">最近完成</h2>

            </div>
            <div class="timeline" id="done-timeline"></div>
          </div>
        </section>
      </main>
    </div>

    <!-- ============================================================
         DETAIL PANEL (slide-out)
         ============================================================ -->
    <div class="panel-overlay" id="panel-overlay"></div>
    <aside

              stroke-linejoin="round"
              stroke-width="2"

      <div class="detail-panel__body" id="panel-body"></div>

      // ── Status enum ──
      var STATUSES = ['待评估', '待排期', '进行中', '已搁置', '已完成'];
      var STATUS_NEXT = {
        待评估: '待排期',
        待排期: '进行中',
        进行中: '已完成',
        已搁置: '待评估',
        已完成: '待评估',
      };

      // ── Derived selectors ──
      function isFrontier(t) {
        return (
          t.status !== '已完成' && (!t.blocked_by || t.blocked_by.length === 0)
        );
      }
      function priorityWeight(p) {
        return { 'P0 紧急': 0, 'P1 高': 1, 'P2 中': 2, 'P3 低': 3 }[p] ?? 9;
      }
      function sortByPriorityAndDue(arr) {
        return arr.slice().sort(function (a, b) {
          var pw = priorityWeight(a.priority) - priorityWeight(b.priority);
          if (pw !== 0) return pw;
          if (a.due_date && b.due_date)
            return a.due_date.localeCompare(b.due_date);
          if (a.due_date) return -1;
          if (b.due_date) return 1;
          return 0;
        });
      }
      function isDoneThisWeek(t) {
        if (!t.completed_at) return false;
        var d = new Date(t.completed_at);
        var now = new Date('2026-07-13T00:00:00Z');
        var weekStart = new Date(now);
        weekStart.setDate(now.getDate() - now.getDay());
        weekStart.setHours(0, 0, 0, 0);
        return d >= weekStart;
      }

      // ── Render helpers ──
      function badgeType(t) {
        return (
          {
            问题: 'badge--type-problem',
            功能需求: 'badge--type-feature',
            优化: 'badge--type-polish',
            技术债: 'badge--type-debt',
          }[t] || ''
        );
      }
      function badgePriority(p) {
        return (
          {
            'P0 紧急': 'badge--priority-p0',
            'P1 高': 'badge--priority-p1',
            'P2 中': 'badge--priority-p2',
            'P3 低': 'badge--priority-p3',
          }[p] || ''
        );
      }
      function escHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>"']/g, function (c) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;',
          }[c];
        });
      }

      // ── Frontier card ──
      function renderFrontierCard(t) {
        var html = '';
        html +=
          '<article class="card" data-open="' +
          t.id +
          '" role="button" tabindex="0">';
        html += '<div class="card__top">';
        html +=
          '<span class="badge ' +
          badgeType(t.type) +
          '">' +
          escHtml(t.type) +
          '</span>';
        html +=
          '<span class="badge ' +
          badgePriority(t.priority) +
          '">' +
          escHtml(t.priority) +
          '</span>';
        if (t.scope)
          html +=
            '<span class="badge badge--scope">' + escHtml(t.scope) + '</span>';
        if (t.slug)
          html +=
            '<span class="badge badge--slug">' + escHtml(t.slug) + '</span>';
        html += '</div>';
        html += '<p class="card__title">' + escHtml(t.title) + '</p>';
        if (t.description)
          html += '<p class="card__desc">' + escHtml(t.description) + '</p>';
        html += '<div class="card__bottom">';
        html += '<span class="card__meta">';
        if (t.due_date) html += '⏰ ' + escHtml(t.due_date);
        html += '</span>';
        html += '<span class="card__actions">';
        html +=
          '<button class="icon-btn" data-cycle="' +
          t.id +
          '" title="推进到「' +
          STATUS_NEXT[t.status] +
          '」" aria-label="推进状态">';
        html +=
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>';
        html += '</button>';
        html +=
          '<button class="icon-btn icon-btn--danger" data-delete="' +
          t.id +
          '" title="删除" aria-label="删除">';
        html +=
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5 7m5 4v6m4-6v6M4 7h16" /></svg>';
        html += '</button>';
        html += '</span></div></article>';
        return html;
      }

      // ── Task row (in-progress / done) ──
      function renderTaskRow(t) {
        var done = t.status === '已完成';
        var html = '';
        html +=
          '<div class="task-row" data-open="' +
          t.id +
          '" role="button" tabindex="0">';
        html +=
          '<span class="task-row__title"' +
          (done ? ' style="text-decoration:line-through;opacity:0.6;"' : '') +
          '>' +
          escHtml(t.title) +
          '</span>';
        html += '<span class="task-row__badges">';
        html +=
          '<span class="badge ' +
          badgeType(t.type) +
          '">' +
          escHtml(t.type) +
          '</span>';
        html +=
          '<span class="badge ' +
          badgePriority(t.priority) +
          '">' +
          escHtml(t.priority) +
          '</span>';
        html += '</span>';
        html += '<span class="task-row__actions">';
        if (!done) {
          html +=
            '<button class="icon-btn" data-cycle="' +
            t.id +
            '" title="推进" aria-label="推进状态">';
          html +=
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>';
          html += '</button>';
        }
        html +=
          '<button class="icon-btn icon-btn--danger" data-delete="' +
          t.id +
          '" title="删除" aria-label="删除">';
        html +=
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5 7m5 4v6m4-6v6M4 7h16" /></svg>';
        html += '</button>';
        html += '</span></div>';
        return html;
      }

      // ── Empty state ──
      function emptyState(title, hint) {
        var html = '';
        html += '<div class="empty-state">';
        html +=
          '<svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">';
        html +=
          '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2" />';
        html += '</svg>';
        html += '<p class="empty-state__title">' + title + '</p>';
        if (hint) html += '<p class="empty-state__hint">' + hint + '</p>';
        html += '</div>';
        return html;
      }

      // ── Dist bars chart colors ──
      var CHART_COLORS = {
        功能需求: 'var(--chart-1)',
        问题: 'var(--chart-4)',
        优化: 'var(--chart-5)',
        技术债: 'var(--chart-2)',
      };

      // ═══════════════════════════════════════════════
      // RENDER ALL
      // ═══════════════════════════════════════════════
      function renderAll() {
        var frontier = sortByPriorityAndDue(TASKS.filter(isFrontier));
        var inProgress = TASKS.filter(function (t) {
          return t.status === '进行中';
        });
        var doneWeek = TASKS.filter(isDoneThisWeek).sort(function (a, b) {
          return b.completed_at.localeCompare(a.completed_at);
        });

        // frontier
        var fg = document.getElementById('frontier-grid');
        fg.innerHTML = frontier.length
          ? frontier.map(renderFrontierCard).join('')
          : emptyState(
              '所有任务都已推进或还在阻塞中',
              '等待前置任务完成, 或新建一个独立任务',
            );

        // in progress
        var ip = document.getElementById('in-progress-list');
        ip.innerHTML = inProgress.length
          ? inProgress.map(renderTaskRow).join('')
          : emptyState('暂无进行中的任务', '从 frontier 选择一项开始');

        // done this week
        var dl = document.getElementById('done-list');
        dl.innerHTML = doneWeek.length
          ? doneWeek.map(renderTaskRow).join('')
          : emptyState('本周还没有完成的任务', '');

        // planning table
        renderPlanningTable(TASKS);

        // review
        renderStats();
        renderDist();
        renderTimeline(doneWeek.slice(0, 6));

        // tab counts
        document.querySelector('[data-count="frontier"]').textContent =
          frontier.length;
        document.querySelector('[data-count="planning"]').textContent =
          TASKS.filter(function (t) {
            return t.status !== '已完成';
          }).length;
        document.querySelector('[data-count="review"]').textContent =
          TASKS.filter(function (t) {
            return t.status === '已完成';
          }).length;
      }

      // ── planning table (with filter) ──
      var activeFilters = { type: [], priority: [] };

      function renderPlanningTable(tasks) {
        var filtered = tasks.filter(function (t) {
          if (t.status === '已完成') return false;
          if (
            activeFilters.type.length &&
            activeFilters.type.indexOf(t.type) === -1
          )
            return false;
          if (
            activeFilters.priority.length &&
            activeFilters.priority.indexOf(t.priority) === -1
          )
            return false;
          return true;
        });

        document.getElementById('plan-count').textContent =
          filtered.length + ' 项';

        var rows = filtered
          .map(function (t) {
            var html =
              '<div class="plan-table__row" data-open="' +
              t.id +
              '" role="button" tabindex="0">';
            html +=
              '<span class="plan-table__title">' + escHtml(t.title) + '</span>';
            html +=
              '<span class="plan-table__meta"><span class="badge ' +

              '">' +
              escHtml(t.type) +
              '</span></span>';
            html +=
              '<span class="plan-table__meta"><span class="badge ' +
              badgePriority(t.priority) +
              '">' +
              escHtml(t.priority) +
              '</span></span>';
            html +=
              '<span class="plan-table__meta">' +
              escHtml(t.scope || '—') +
              '</span>';
            html +=
              '<span class="plan-table__meta"><span class="status-chip status-chip--' +
              statusClass(t.status) +
              '">' +
              t.status +
              '</span></span>';

              '<span class="plan-table__meta"><button class="icon-btn" data-delete="' +
              t.id +

            html += '</div>';
            return html;
          })
          .join('');

        var table = document.getElementById('plan-table');
        table.innerHTML =
          '<div class="plan-table__row"><span>标题</span><span>类型</span><span>优先级</span><span>范围</span><span>状态</span><span></span></div>' +
          rows;
      }

      function statusClass(s) {
        return (
          {
            待评估: 'todo',
            待排期: 'scheduled',
            进行中: 'in-progress',
            已搁置: 'on-hold',
            已完成: 'done',
          }[s] || 'todo'
        );
      }

      // ── stats ──
      function renderStats() {
        document.getElementById('stat-this-week').textContent =
          TASKS.filter(isDoneThisWeek).length;
        document.getElementById('stat-total').textContent = TASKS.length;
        document.getElementById('stat-in-progress').textContent = TASKS.filter(
          function (t) {
            return t.status === '进行中';
          },
        ).length;
        document.getElementById('stat-urgent').textContent = TASKS.filter(
          function (t) {
            return t.priority === 'P0 紧急' && t.status !== '已完成';
          },
        ).length;
      }

      // ── type distribution ──
      function renderDist() {
        var types = ['功能需求', '问题', '优化', '技术债'];
        var total = TASKS.length;
        var list = types
          .map(function (tp) {
            var count = TASKS.filter(function (t) {
              return t.type === tp;
            }).length;
            var pct = total ? (count / total) * 100 : 0;
            var html = '';
            html += '<div class="dist-row">';
            html += '<span class="dist-row__label">' + tp + '</span>';
            html +=
              '<span class="dist-row__track"><span class="dist-row__fill" style="background:' +
              CHART_COLORS[tp] +
              '; transform:scaleX(' +
              pct / 100 +
              '); width:100%;"></span></span>';
            html += '<span class="dist-row__count">' + count + '</span>';
            html += '</div>';
            return html;
          })
          .join('');
        document.getElementById('dist-list').innerHTML = list;
      }

      // ── timeline ──
      function renderTimeline(arr) {
        var html = arr
          .map(function (t) {
            var date = (t.completed_at || '').slice(0, 10);
            var item =
              '<div class="timeline__item"><span class="timeline__dot"></span>';
            item += '<div class="timeline__content">';
            item +=
              '<div class="timeline__title">' + escHtml(t.title) + '</div>';
            item += '<div class="timeline__date">' + date + '</div>';
            item += '</div></div>';
            return item;
          })
          .join('');
        document.getElementById('done-timeline').innerHTML =
          html || emptyState('暂无已完成任务', '');

        document
          .getElementById('panel-overlay')
          .setAttribute('data-open', 'true');
        document.body.style.overflow = 'hidden';
      }
      function closePanel() {
        document.getElementById('detail-panel').removeAttribute('data-open');
        document.getElementById('panel-overlay').removeAttribute('data-open');
        document.body.style.overflow = '';
        activeTask = null;
      }

      function renderPanel() {
        var t = activeTask;
        document.getElementById('panel-title').textContent = t.title;
        var body = '';
        if (t.description) {
          body +=
            '<div class="field"><span class="field__label">描述</span><p class="field__value">' +
            escHtml(t.description) +
            '</p></div>';
        }
        if (t.detail) {
          body +=
            '<div class="field"><span class="field__label">详情</span><p class="field__value">' +
            escHtml(t.detail) +
            '</p></div>';
        }

        // status selector
        body +=
          '<div class="field"><span class="field__label">状态</span><div class="status-selector">';
        STATUSES.forEach(function (s) {
          var pressed = s === t.status ? 'true' : 'false';
          body +=
            '<button class="status-selector__btn" data-set-status="' +
            s +
            '" aria-pressed="' +
            pressed +
            '">' +
            s +
            '</button>';
        });
        body += '</div></div>';

        // badges
        body +=
          '<div class="field"><span class="field__label">标签</span><div style="display:flex;flex-wrap:wrap;gap:0.375rem;">';
        body +=
          '<span class="badge ' +
          badgeType(t.type) +
          '">' +
          escHtml(t.type) +
          '</span>';
        body +=
          '<span class="badge ' +
          badgePriority(t.priority) +
          '">' +
          escHtml(t.priority) +
          '</span>';
        if (t.scope)
          body +=
            '<span class="badge badge--scope">' + escHtml(t.scope) + '</span>';
        if (t.slug)
          body +=
            '<span class="badge badge--slug">' + escHtml(t.slug) + '</span>';
        if (t.blocked_by && t.blocked_by.length) {
          body +=
            '<span class="badge" style="border-color:var(--warning);color:var(--warning);">⛔ 依赖 ' +
            t.blocked_by.length +
            ' 项</span>';
        }
        body += '</div></div>';

        if (t.due_date) {
          body +=
            '<div class="field"><span class="field__label">截止日</span><p class="field__value">' +
            escHtml(t.due_date) +
            '</p></div>';
        }

        // spec
        if (t.acceptance_criteria) {
          body +=
            '<div class="field"><span class="field__label">验收标准</span><p class="field__value">' +
            escHtml(t.acceptance_criteria) +
            '</p></div>';
        }
        if (t.constraints) {
          body +=
            '<div class="field"><span class="field__label">约束</span><p class="field__value">' +
            escHtml(t.constraints) +
            '</p></div>';
        }
        if (t.context_pointers) {
          body +=
            '<div class="field"><span class="field__label">上下文指针</span><p class="field__value" style="font-family:var(--font-mono);font-size:0.8125rem;">' +
            escHtml(t.context_pointers) +
            '</p></div>';
        }

        // meta
        body +=
          '<div class="field"><span class="field__label">元数据</span><p class="field__value" style="font-family:var(--font-mono);font-size:0.75rem;color:var(--muted-fg);">';
        body += 'ID: ' + t.id + '<br>';
        body += '创建于 ' + (t.created_at || '').slice(0, 10) + '<br>';
        body += '更新于 ' + (t.updated_at || '').slice(0, 10);
        body += '</p></div>';

        document.getElementById('panel-body').innerHTML = body;

        // footer: delete
        var footer = document.getElementById('panel-delete-slot');
        footer.innerHTML =
          '<button class="btn-danger" id="btn-panel-delete" type="button">永久删除</button>';

        // saved hint
        var hint = document.getElementById('panel-saved-hint');
        hint.textContent = '';
      }

      // ═══════════════════════════════════════════════
      // EVENT WIRING (delegation)
      // ═══════════════════════════════════════════════
      document.addEventListener('click', function (e) {
        var target = e.target;

        // tab switching
        var tabBtn = target.closest('.tab-bar__btn');
        if (tabBtn) {
          switchTab(tabBtn.getAttribute('data-tab'));
          return;
        }

        // open panel via card / row
        var openEl = target.closest('[data-open]');
        if (openEl && !target.closest('button')) {
          openPanel(openEl.getAttribute('data-open'));
          return;
        }

        // quick cycle status
        var cycleBtn = target.closest('[data-cycle]');
        if (cycleBtn) {
          e.stopPropagation();
          cycleTask(cycleBtn.getAttribute('data-cycle'));
          return;
        }

        // delete trigger
        var delBtn = target.closest('[data-delete]');
        if (delBtn) {
          e.stopPropagation();
          confirmDelete(delBtn.getAttribute('data-delete'));
          return;
        }

        // set status inside panel
        var setSt = target.closest('[data-set-status]');
        if (setSt) {
          e.stopPropagation();
          setTaskStatus(activeTask.id, setSt.getAttribute('data-set-status'));
          return;
        }

        // panel delete
        if (target.id === 'btn-panel-delete') {
          e.stopPropagation();
          confirmHardDelete(activeTask.id);
          return;
        }

        // filter chips
        var chip = target.closest('[data-filter]');
        if (chip) {
          toggleFilter(
            chip.getAttribute('data-filter'),
            chip.getAttribute('data-value'),
          );
          return;
        }

        // create button
        if (target.id === 'btn-create' || target.closest('#btn-create')) {
          e.stopPropagation();
          openCreatePanel();
          return;
        }

        // theme toggle
        if (target.id === 'theme-toggle' || target.closest('#theme-toggle')) {
          toggleTheme();
          return;
        }

        // close panel via overlay
        if (target.id === 'panel-overlay' || target.id === 'panel-close') {
          closePanel();
          return;
        }
      });

      // keyboard: open on Enter when card focused
      document.addEventListener('keydown', function (e) {
        if (
          e.key === 'Enter' &&
          document.activeElement &&
          document.activeElement.hasAttribute('data-open')
        ) {
          openPanel(document.activeElement.getAttribute('data-open'));
        }
        if (e.key === 'Escape') closePanel();
      });

      // ── tab switch ──
      var activeTab = 'frontier';
      function switchTab(name) {
        if (name === activeTab) return;
        activeTab = name;
        document.querySelectorAll('.tab-bar__btn').forEach(function (btn) {
          btn.setAttribute(
            'aria-selected',
            btn.getAttribute('data-tab') === name ? 'true' : 'false',
          );
        });
        document.querySelectorAll('.tab-panel').forEach(function (panel) {
          panel.setAttribute(
            'aria-hidden',
            panel.getAttribute('data-panel') === name ? 'false' : 'true',
          );
        });
      }

      // ── cycle status ──
      function cycleTask(id) {
        var t = TASKS.filter(function (x) {
          return x.id === id;
        })[0];
        if (!t) return;
        t.status = STATUS_NEXT[t.status] || '待评估';
        t.updated_at = '2026-07-13T10:00:00Z';
        renderAll();
        // show toast
        showStatusToast(t);
      }

      function setTaskStatus(id, status) {
        var t = TASKS.filter(function (x) {
          return x.id === id;
        })[0];
        if (!t) return;
        t.status = status;
        t.updated_at = '2026-07-13T10:00:00Z';
        if (status === '已完成') t.completed_at = '2026-07-13T10:00:00Z';
        renderAll();
        renderPanel();
      }

      function showStatusToast(t) {
        var hint = document.getElementById('panel-saved-hint');
        if (hint) hint.textContent = '已推进到「' + t.status + '」 ✓';
      }

      // ── delete confirm (inline) ──
      var pendingDeleteId = null;
      function confirmDelete(id) {
        pendingDeleteId = id;
        var t = TASKS.filter(function (x) {
          return x.id === id;
        })[0];
        // inject inline confirm bar into card / row
        var el = document.querySelector(
          '[data-open="' +
            id +
            '"] .card__bottom, [data-open="' +
            id +
            '"] .task-row__actions',
        );
        if (!el) return;
        var bar = document.createElement('div');
        bar.className = 'confirm-bar';
        bar.style.cssText =
          'position:absolute;right:0;bottom:0;left:0;z-index:2;border-radius:0 0 var(--radius-xl) var(--radius-xl);';
        bar.innerHTML =
          '<span>永久删除「' +
          escHtml(t.title) +
          '」?</span>' +
          '<button class="confirm-bar__btn confirm-bar__btn--confirm" data-confirm-del="' +
          id +
          '">确认</button>' +
          '<button class="confirm-bar__btn confirm-bar__btn--cancel" data-cancel-del>取消</button>';
        el.style.position = 'relative';
        el.appendChild(bar);

        bar
          .querySelector('[data-confirm-del]')
          .addEventListener('click', function (ev) {
            ev.stopPropagation();
            hardDelete(id);
          });
        bar
          .querySelector('[data-cancel-del]')
          .addEventListener('click', function (ev) {
            ev.stopPropagation();
            bar.remove();
            pendingDeleteId = null;
          });
      }

      function confirmHardDelete(id) {
        var t = TASKS.filter(function (x) {
          return x.id === id;
        })[0];
        if (!t) return;
        if (confirm('永久删除「' + t.title + '」? 此操作不可撤销。')) {
          hardDelete(id);
          closePanel();
        }
      }

      function hardDelete(id) {
        TASKS = TASKS.filter(function (t) {
          return t.id !== id;
        });
        renderAll();
        showGlobalToast('任务已删除');
      }

      // ── filter toggle ──
      function toggleFilter(key, val) {
        var arr = activeFilters[key];
        var idx = arr.indexOf(val);
        if (idx === -1) arr.push(val);
        else arr.splice(idx, 1);
        // update UI
        document
          .querySelectorAll('[data-filter="' + key + '"]')
          .forEach(function (c) {
            c.setAttribute(
              'aria-pressed',
              activeFilters[key].indexOf(c.getAttribute('data-value')) !== -1
                ? 'true'
                : 'false',
            );
          });
        renderPlanningTable(TASKS);
      }

      // ── open create panel ──
      function openCreatePanel() {
        activeTask = {
          id: 'new-' + Date.now(),
          title: '',
          description: '',
          detail: '',
          type: '功能需求',
          priority: 'P2 中',
          scope: '',
          status: '待评估',
          due_date: '',
          slug: '',
          acceptance_criteria: '',
          constraints: '',
          context_pointers: '',
          created_at: '',
          updated_at: '',
          completed_at: null,
          blocked_by: [],
        };
        document.getElementById('panel-title').textContent = '[新建任务]';
        var body = '<div class="empty-state">';
        body +=
          '<p class="empty-state__title">原型: 点击"新建任务"打开表单</p>';
        body +=
          '<p class="empty-state__hint">(实现阶段会在面板内渲染完整表单, 与 DevTaskModal.vue 字段一致)</p>';
        body += '</div>';
        document.getElementById('panel-body').innerHTML = body;
        document.getElementById('panel-delete-slot').innerHTML = '';
        document.getElementById('panel-saved-hint').textContent = '';
        document
          .getElementById('detail-panel')
          .setAttribute('data-open', 'true');
        document
          .getElementById('panel-overlay')
          .setAttribute('data-open', 'true');
        document.body.style.overflow = 'hidden';
      }

      // ── toast / feedback ──
      function showGlobalToast(msg) {
        var t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText =
          'position:fixed;left:50%;bottom:2rem;transform:translateX(-50%);' +
          'padding:0.5rem 1rem;background:var(--fg);color:var(--bg);border-radius:var(--radius-md);' +
          'font-size:0.8125rem;font-weight:500;z-index:99999;box-shadow:var(--shadow-card-hover);' +
          'animation:messagePop 0.3s ease-out;';
        document.body.appendChild(t);
        setTimeout(function () {
          t.style.opacity = '0';
          t.style.transition = 'opacity 0.3s';
          setTimeout(function () {
            t.remove();
          }, 300);
        }, 2000);
      }

      // ── theme toggle ──
      var dark = false;
      function toggleTheme() {
        dark = !dark;
        document.documentElement.className = dark ? 'dark' : '';
        var icon = document.getElementById('theme-icon');
        if (dark) {
          // sun
          icon.innerHTML =
            '<circle cx="12" cy="12" r="5" /><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />';
        } else {
          // moon
          icon.innerHTML =
            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />';
        }
      }

      // ── init ──
      renderAll();
    </script>
  </body>
</html>
