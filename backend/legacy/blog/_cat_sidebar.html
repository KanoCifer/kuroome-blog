{% if categories %}
  <aside class="w-full shrink-0 lg:w-64">
    <div
      class="sticky top-8 rounded-xl border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-900"
    >
      <div class="border-b border-gray-200 px-5 py-4 dark:border-gray-700">
        <h3
          class="text-sm font-semibold tracking-wide text-gray-500 uppercase dark:text-gray-400"
        >
          Categories
        </h3>
      </div>
      <ul class="divide-y divide-gray-100 p-2 dark:divide-gray-700">
        <li>
          <a
            href="{{ url_for('blog.index') }}"
            class="group {% if not active_category %}
              bg-blue-50 text-blue-700 font-semibold dark:bg-blue-900/40
              dark:text-blue-400
            {% else %}
              text-gray-700 hover:bg-blue-50 hover:text-blue-700
              dark:text-gray-300 dark:hover:bg-blue-900/40
              dark:hover:text-blue-400
            {% endif %} flex items-center justify-between rounded-lg px-3 py-2.5 text-sm transition-colors"
          >
            <span class="font-medium">All Categories</span>
            <span
              class="{% if not active_category %}
                bg-blue-100 text-blue-600 dark:bg-blue-900 dark:text-blue-300
              {% else %}
                bg-gray-100 text-gray-500 group-hover:bg-blue-100
                group-hover:text-blue-600 dark:bg-gray-700 dark:text-gray-400
                dark:group-hover:bg-blue-900 dark:group-hover:text-blue-300
              {% endif %} rounded-full px-2 py-0.5 text-xs font-medium transition-colors"
            >
              {{ categories | map(attribute='posts_count') | sum }}
            </span>
          </a>
        </li>
        {% for category in categories %}
          <li>
            <a
              href="{{ url_for('blog.category', category_id=category.id) }}"
              class="group {% if active_category and active_category.id == category.id %}
                bg-blue-50 text-blue-700 font-semibold dark:bg-blue-900/40
                dark:text-blue-400
              {% else %}
                text-gray-700 hover:bg-blue-50 hover:text-blue-700
                dark:text-gray-300 dark:hover:bg-blue-900/40
                dark:hover:text-blue-400
              {% endif %} flex items-center justify-between rounded-lg px-3 py-2.5 text-sm transition-colors"
            >
              <span class="font-medium">{{ category.name }}</span>
              <span
                class="{% if active_category and active_category.id == category.id %}
                  bg-blue-100 text-blue-600 dark:bg-blue-900 dark:text-blue-300
                {% else %}
                  bg-gray-100 text-gray-500 group-hover:bg-blue-100
                  group-hover:text-blue-600 dark:bg-gray-700 dark:text-gray-400
                  dark:group-hover:bg-blue-900 dark:group-hover:text-blue-300
                {% endif %} rounded-full px-2 py-0.5 text-xs font-medium transition-colors"
              >
                {{ category.posts_count }}
              </span>
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>
  </aside>
{% endif %}
