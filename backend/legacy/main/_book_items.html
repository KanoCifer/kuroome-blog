{% for user_book in user_books %}
  <li
    class="group flex flex-col gap-4 p-5 transition-all hover:bg-gray-50 sm:flex-row sm:items-center sm:justify-between dark:hover:bg-gray-700/30"
  >
    <div class="min-w-0 flex-1">
      <div class="flex items-start justify-between gap-4 sm:block">
        <p
          class="truncate text-lg font-semibold text-gray-900 dark:text-gray-100"
          title="{{ user_book.book.title }}"
        >
          {{ user_book.book.title }}

          {% if user_book.iscompleted %}
            <span
              class="inline-flex shrink-0 items-center rounded-full bg-green-50 px-2.5 py-0.5 text-xs font-medium text-green-700 ring-1 ring-green-600/20 ring-inset sm:ml-2 dark:bg-green-400/10 dark:text-green-400"
              >Done</span
            >
          {% else %}
            <span
              class="inline-flex shrink-0 items-center rounded-full bg-orange-50 px-2.5 py-0.5 text-xs font-medium text-orange-700 ring-1 ring-orange-600/20 ring-inset sm:ml-2 dark:bg-orange-400/10 dark:text-orange-400"
              >Reading</span
            >
          {% endif %}
        </p>
      </div>
      <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
        by {{ user_book.book.author }}
      </p>
    </div>

    <div
      class="flex flex-wrap items-center gap-2 opacity-0 transition-opacity duration-200 group-hover:opacity-100"
    >
      <form
        method="post"
        action="{{ url_for('main.toggle_completion', book_id=user_book.book.id) }}"
      >
        <button
          type="submit"
          class="btn group/btn relative inline-flex items-center gap-1.5 overflow-hidden rounded-xl px-4 py-2 text-sm font-medium"
          title="{% if user_book.iscompleted %}
            Mark as Unread
          {% else %}
            Mark as Read
          {% endif %}"
        >
          {% if user_book.iscompleted %}
            <svg
              class="h-4 w-4 text-gray-500 transition-colors group-hover/btn:text-blue-600"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"
              />
            </svg>
            <span>Undo</span>
          {% else %}
            <svg
              class="h-4 w-4 text-gray-500 transition-colors group-hover/btn:text-green-600"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
            <span>Finish</span>
          {% endif %}
        </button>
      </form>

      <a
        href="{{ url_for('main.edit', book_id=user_book.book.id) }}"
        class="btn inline-flex items-center gap-1.5 rounded-xl px-4 py-2 text-sm font-medium"
      >
        <svg
          class="h-4 w-4 text-gray-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
          />
        </svg>
        Edit
      </a>

      <form
        class="delete-form"
        method="post"
        action="{{ url_for('api.delete', book_id=user_book.book.id) }}"
      >
        {{ delete_form.hidden_tag() }}
        <button
          type="submit"
          class="btn inline-flex items-center gap-1.5 rounded-xl px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 hover:text-red-700 dark:text-red-400 dark:hover:bg-red-900/30"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
            />
          </svg>
          Delete
        </button>
      </form>
    </div>
    <a
      href="https://book.douban.com/subject_search?search_text={{ user_book.book.title }}"
      target="_blank"
      class="douban inline-flex items-center gap-1 rounded-xl bg-[#00B51D]/10 px-3 py-2 text-sm font-bold text-[#00B51D] hover:bg-[#00B51D]/20 dark:bg-[#00B51D]/20 dark:text-[#00B51D] dark:hover:bg-[#00B51D]/30"
    >
      Douban
    </a>
  </li>
{% endfor %}
