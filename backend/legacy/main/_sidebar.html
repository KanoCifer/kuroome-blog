<div class="hidden lg:col-span-1 lg:block">
  <div class="sticky top-55 space-y-6">
    <!-- Profile Card -->
    <div
      class="rounded-2xl border border-slate-100 bg-white/80 p-6 shadow-sm backdrop-blur-sm transition-all duration-300 hover:shadow-md dark:border-slate-700 dark:bg-slate-800/80"
    >
      <div class="flex flex-col items-center text-center">
        <!-- Avatar with Glow -->
        <div class="group relative mb-4">
          <div
            class="absolute -inset-1 rounded-full bg-linear-to-br from-pink-200 to-blue-200 opacity-50 blur transition duration-500 group-hover:opacity-75"
          ></div>
          <a href="{{ url_for('main.about') }}">
            <img
              src="{{ url_for('static', filename='images/about.webp') }}"
              alt="Kuroome"
              class="relative h-32 w-32 transform rounded-full border-4 border-white object-cover shadow-xl transition duration-500 group-hover:scale-105 dark:border-slate-700"
          /></a>
        </div>

        <!-- Name -->
        <h2 class="mb-2 text-2xl font-bold text-slate-800 dark:text-slate-100">
          Kuroome
        </h2>

        <!-- Role/Title Badge -->
        <div class="mb-4">
          <span
            class="inline-flex items-center rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600 dark:bg-slate-700 dark:text-slate-300"
          >
            Developer & Student
          </span>
        </div>

        <!-- Bio/Bullet Points -->
        <div
          class="mt-2 w-full space-y-3 text-left text-sm text-slate-600 dark:text-slate-300"
        >
          <div class="flex items-start gap-3">
            <span
              class="mt-1.5 flex h-1.5 w-1.5 shrink-0 rounded-full bg-blue-400"
            ></span>
            <span>国际政治专业在读学生</span>
          </div>
          <div class="flex items-start gap-3">
            <span
              class="mt-1.5 flex h-1.5 w-1.5 shrink-0 rounded-full bg-purple-400"
            ></span>
            <span>正在自学编程与开发</span>
          </div>
          <div class="flex items-start gap-3">
            <span
              class="mt-1.5 flex h-1.5 w-1.5 shrink-0 rounded-full bg-pink-400"
            ></span>
            <span>爱好编程、阅读、钓鱼等</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Tags/Badges Card -->
    <div
      class="rounded-2xl border border-slate-100 bg-white/80 p-5 shadow-sm backdrop-blur-sm dark:border-slate-700 dark:bg-slate-800/80"
    >
      <h3
        class="mb-3 text-xs font-bold tracking-wider text-slate-400 uppercase"
      >
        Tech Stack
      </h3>
      <div class="flex flex-wrap gap-2">
        <span
          class="cursor-default rounded-md bg-blue-100 px-2.5 py-1 text-xs font-medium text-blue-700 transition-colors hover:bg-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:hover:bg-blue-900/50"
        >
          Python <span class="ml-1 opacity-60">3</span>
        </span>
        <span
          class="cursor-default rounded-md bg-yellow-100 px-2.5 py-1 text-xs font-medium text-yellow-700 transition-colors hover:bg-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-300 dark:hover:bg-yellow-900/50"
        >
          JavaScript <span class="ml-1 opacity-60">2</span>
        </span>
        <span
          class="cursor-default rounded-md bg-green-100 px-2.5 py-1 text-xs font-medium text-green-700 transition-colors hover:bg-green-200 dark:bg-green-900/30 dark:text-green-300 dark:hover:bg-green-900/50"
        >
          Flask <span class="ml-1 opacity-60">2</span>
        </span>
        <span
          class="cursor-default rounded-md bg-purple-100 px-2.5 py-1 text-xs font-medium text-purple-700 transition-colors hover:bg-purple-200 dark:bg-purple-900/30 dark:text-purple-300 dark:hover:bg-purple-900/50"
        >
          Tailwind <span class="ml-1 opacity-60">1</span>
        </span>
        <span
          class="cursor-default rounded-md bg-indigo-100 px-2.5 py-1 text-xs font-medium text-indigo-700 transition-colors hover:bg-indigo-200 dark:bg-indigo-900/30 dark:text-indigo-300 dark:hover:bg-indigo-900/50"
        >
          SQL <span class="ml-1 opacity-60">1</span>
        </span>
        <span
          class="cursor-default rounded-md bg-rose-100 px-2.5 py-1 text-xs font-medium text-rose-700 transition-colors hover:bg-rose-200 dark:bg-rose-900/30 dark:text-rose-300 dark:hover:bg-rose-900/50"
        >
          Vue <span class="ml-1 opacity-60">1</span>
        </span>
      </div>
    </div>
  </div>
